<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lube Catalog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="text-gray-900 min-h-screen">

<div x-data="catalog()" x-init="init()" x-cloak class="bg-white min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
      <a href="#/" class="shrink-0 translate-y-px" style="transform: translateY(2px)"><svg width="156" height="23" viewBox="0 0 156 23" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3.99351e-06 17.592V1.90735e-06H2.664V17.592H3.99351e-06ZM12.1333 17.928C8.55732 17.928 6.22932 15.624 6.22932 12.12V4.632H8.89332V11.76C8.89332 14.016 10.1173 15.384 12.1333 15.384C14.1493 15.384 15.3493 13.992 15.3493 11.76V4.632H18.0133V12.12C18.0133 15.624 15.7093 17.928 12.1333 17.928ZM28.5214 4.32C32.4574 4.32 35.2654 7.224 35.2654 11.136C35.2654 15 32.4574 17.928 28.5214 17.928C26.7214 17.928 25.1134 17.256 23.9614 16.128L23.6254 17.616H21.6094V1.90735e-06H24.2734V5.832C25.4014 4.872 26.8654 4.32 28.5214 4.32ZM28.3294 15.36C30.7774 15.36 32.5534 13.56 32.5534 11.112C32.5534 8.688 30.7774 6.864 28.3294 6.864C25.8814 6.864 24.0814 8.688 24.0814 11.112C24.0814 13.536 25.8814 15.36 28.3294 15.36ZM50.4448 11.16C50.4448 11.448 50.4208 11.736 50.3728 12.024H39.8608C40.1968 14.136 41.7088 15.432 43.8208 15.432C45.3808 15.432 46.6288 14.712 47.3248 13.512H50.1328C49.1008 16.248 46.7248 17.928 43.8208 17.928C40.0288 17.928 37.1728 15 37.1728 11.112C37.1728 7.248 40.0288 4.32 43.8208 4.32C47.8048 4.32 50.4448 7.392 50.4448 11.16ZM43.8208 6.744C41.8288 6.744 40.3648 7.944 39.9328 9.864H47.7568C47.2768 7.896 45.8128 6.744 43.8208 6.744ZM67.1203 17.904C62.1523 17.904 58.4803 14.232 58.4803 9.216C58.4803 4.176 62.1523 0.504003 67.1203 0.504003C71.0803 0.504003 74.2723 2.976 75.1603 6.768H72.3763C71.5603 4.536 69.5923 3.168 67.1203 3.168C63.7603 3.168 61.2883 5.712 61.2883 9.216C61.2883 12.72 63.7603 15.24 67.1203 15.24C69.6883 15.24 71.6563 13.776 72.4243 11.4H75.2323C74.3443 15.36 71.1523 17.904 67.1203 17.904ZM88.7543 4.632H90.7943V17.592H88.6583L88.3943 16.032C87.2183 17.208 85.5863 17.928 83.6903 17.928C79.8263 17.928 76.9463 15 76.9463 11.112C76.9463 7.224 79.8263 4.32 83.6903 4.32C85.6103 4.32 87.2663 5.04 88.4423 6.264L88.7543 4.632ZM83.9063 15.36C86.3543 15.36 88.1303 13.56 88.1303 11.112C88.1303 8.664 86.3543 6.864 83.9063 6.864C81.4583 6.864 79.6583 8.688 79.6583 11.112C79.6583 13.536 81.4583 15.36 83.9063 15.36ZM100.377 15.192H101.865V17.592H99.8732C97.0412 17.592 95.2892 15.84 95.2892 12.984V6.936H92.9612V6.408L97.4732 1.608H97.9292V4.632H101.793V6.936H97.9532V12.768C97.9532 14.328 98.8172 15.192 100.377 15.192ZM115.168 4.632H117.208V17.592H115.072L114.808 16.032C113.632 17.208 112 17.928 110.104 17.928C106.24 17.928 103.36 15 103.36 11.112C103.36 7.224 106.24 4.32 110.104 4.32C112.024 4.32 113.68 5.04 114.856 6.264L115.168 4.632ZM110.32 15.36C112.768 15.36 114.544 13.56 114.544 11.112C114.544 8.664 112.768 6.864 110.32 6.864C107.872 6.864 106.072 8.688 106.072 11.112C106.072 13.536 107.872 15.36 110.32 15.36ZM121.031 17.592V1.90735e-06H123.695V17.592H121.031ZM133.453 17.928C129.469 17.928 126.517 15.024 126.517 11.112C126.517 7.2 129.469 4.32 133.453 4.32C137.413 4.32 140.365 7.224 140.365 11.112C140.365 15.024 137.413 17.928 133.453 17.928ZM133.453 15.384C135.901 15.384 137.653 13.608 137.653 11.112C137.653 8.64 135.901 6.864 133.453 6.864C130.981 6.864 129.229 8.64 129.229 11.112C129.229 13.608 130.981 15.384 133.453 15.384ZM153.811 4.632H155.563V15.912C155.563 20.04 153.115 22.56 149.107 22.56C145.771 22.56 143.419 20.832 142.771 18H145.411C145.915 19.416 147.451 20.208 149.083 20.208C151.315 20.208 152.971 18.72 152.971 16.272V15.672C151.843 16.656 150.355 17.232 148.675 17.232C145.051 17.232 142.267 14.424 142.267 10.776C142.267 7.152 145.051 4.32 148.675 4.32C150.571 4.32 152.227 5.088 153.403 6.312L153.811 4.632ZM148.963 14.76C151.267 14.76 152.947 13.08 152.947 10.776C152.947 8.496 151.291 6.816 148.963 6.816C146.659 6.816 144.979 8.52 144.979 10.776C144.979 13.056 146.659 14.76 148.963 14.76Z" fill="#101016"/></svg></a>
      <div class="flex items-center gap-3 flex-1 max-w-xl">
        <div class="relative flex-1">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input
            type="text"
            x-model="search"
            placeholder="Search components..."
            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          >
        </div>
      </div>
      <span class="text-sm text-gray-500 shrink-0" x-text="filteredComponents.length + ' components'"></span>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 flex">

    <!-- Sidebar: Component List -->
    <aside class="w-48 shrink-0 hidden md:block md:pr-6 md:border-r md:border-gray-200">
      <nav class="sticky top-24 space-y-0.5 max-h-[calc(100vh-7rem)] overflow-y-auto">
        <a
          href="#/"
          :class="!activeComponentId ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-gray-600 hover:bg-gray-100'"
          class="block w-full text-left px-3 py-1.5 rounded-lg text-sm transition-colors truncate"
        >Home</a>
        <div class="border-t border-gray-200 !mt-3 !mb-3"></div>
        <template x-for="comp in allComponentsSorted" :key="comp.id">
          <div>
            <div x-show="comp._firstToken" class="border-t border-gray-200 my-3"></div>
            <a
              :href="'#/' + comp.id"
              :class="activeComponentId === comp.id ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-gray-600 hover:bg-gray-100'"
              class="block w-full text-left px-3 py-1.5 rounded-lg text-sm transition-colors truncate"
              x-text="comp.name"
            ></a>
          </div>
        </template>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 min-w-0 md:p-10">

      <!-- Mobile Component Selector -->
      <div class="md:hidden mb-4">
        <select
          @change="if ($event.target.value) { location.hash = '#/' + $event.target.value; $event.target.value = ''; }"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white"
        >
          <option value="">Jump to component...</option>
          <template x-for="comp in allComponentsSorted" :key="comp.id">
            <option :value="comp.id" x-text="comp.name"></option>
          </template>
        </select>
      </div>

      <!-- Landing View (no component selected) -->
      <template x-if="!activeComponent">
        <div class="space-y-10">

          <!-- UI Components Grid -->
          <template x-if="filteredUIComponents.length > 0">
            <div>
              <h2 class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>UI Components</h2>
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="comp in filteredUIComponents" :key="comp.id">
                  <a
                    :href="'#/' + comp.id"
                    class="block bg-[#f8f8fa] rounded-xl p-5 hover:bg-[#f0f0f4] transition-all"
                  >
                    <div class="flex items-start justify-between gap-2 mb-2">
                      <h3 class="text-base font-semibold text-gray-900" x-text="comp.name"></h3>
                      <span class="shrink-0 px-2 py-0.5 bg-white text-gray-600 rounded text-xs font-medium" x-text="getCategoryLabel(comp.category)"></span>
                    </div>
                    <p class="text-xs text-gray-500 line-clamp-2" x-text="comp.description"></p>
                  </a>
                </template>
              </div>
            </div>
          </template>

          <!-- Design Tokens Grid -->
          <template x-if="filteredTokenComponents.length > 0">
            <div>
              <h2 class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Design Tokens</h2>
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="comp in filteredTokenComponents" :key="comp.id">
                  <a
                    :href="'#/' + comp.id"
                    class="block bg-[#f8f8fa] rounded-xl p-5 hover:bg-[#f0f0f4] transition-all"
                  >
                    <div class="flex items-start justify-between gap-2 mb-2">
                      <h3 class="text-base font-semibold text-gray-900" x-text="comp.name"></h3>
                      <span class="shrink-0 px-2 py-0.5 bg-white text-gray-600 rounded text-xs font-medium" x-text="getCategoryLabel(comp.category)"></span>
                    </div>
                    <p class="text-xs text-gray-500 line-clamp-2" x-text="comp.description || ''"></p>
                  </a>
                </template>
              </div>
            </div>
          </template>

          <!-- Empty State -->
          <div x-show="filteredUIComponents.length === 0 && filteredTokenComponents.length === 0" class="text-center py-16">
            <p class="text-gray-400 text-sm">No components found.</p>
          </div>
        </div>
      </template>

      <!-- Component Detail View -->
      <template x-if="activeComponent">
        <div>
          <!-- Component Detail -->
          <div>

            <!-- Component Header -->
            <div class="flex items-center justify-between gap-3">
              <h2 class="text-3xl font-bold tracking-tight" x-text="activeComponent.name"></h2>
              <div class="flex items-center gap-2 shrink-0">
                <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs font-medium" x-text="getCategoryLabel(activeComponent.category)"></span>
                <template x-if="activeComponent.figmaUrl">
                  <a :href="activeComponent.figmaUrl" target="_blank" rel="noopener" class="inline-flex items-center gap-1 px-2.5 py-1 bg-purple-50 text-purple-700 rounded-md text-xs font-medium hover:bg-purple-100 transition-colors">
                    <svg class="w-3.5 h-3.5" viewBox="0 0 38 57" fill="currentColor"><path d="M19 28.5a9.5 9.5 0 1 1 19 0 9.5 9.5 0 0 1-19 0z"/><path d="M0 47.5A9.5 9.5 0 0 1 9.5 38H19v9.5a9.5 9.5 0 1 1-19 0z"/><path d="M19 0v19h9.5a9.5 9.5 0 1 0 0-19H19z"/><path d="M0 9.5A9.5 9.5 0 0 0 9.5 19H19V0H9.5A9.5 9.5 0 0 0 0 9.5z"/><path d="M0 28.5A9.5 9.5 0 0 0 9.5 38H19V19H9.5A9.5 9.5 0 0 0 0 28.5z"/></svg>
                    Figma
                  </a>
                </template>
              </div>
            </div>

            <!-- Preview -->
            <section class="py-6 rounded-lg overflow-hidden">
              <iframe
                :src="activeComponent.preview + '?v=' + cacheKey + (activeComponent.hasDemo ? '&view=preview' : '')"
                class="w-full border-0"
                :title="activeComponent.name + ' preview'"
                @load="resizeIframe($event.target)"
                style="min-height: 100px;"
              ></iframe>
            </section>

            <!-- Demo (separate iframe) -->
            <template x-if="activeComponent.hasDemo">
              <section class="py-6 rounded-lg overflow-hidden">
                <iframe
                  :src="activeComponent.preview + '?v=' + cacheKey + '&view=demo'"
                  class="w-full border-0"
                  :title="activeComponent.name + ' demo'"
                  @load="resizeIframe($event.target)"
                  style="min-height: 100px;"
                ></iframe>
              </section>
            </template>

            <!-- Props -->
            <template x-if="activeComponent.props && activeComponent.props.length > 0">
              <section class="py-6">
                <h3 class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Props</h3>
                <table class="w-full text-sm">
                  <thead class="bg-[#f8f8fa]">
                    <tr class="text-left">
                      <th class="px-3 py-2 font-semibold text-gray-700">Name</th>
                      <th class="px-3 py-2 font-semibold text-gray-700">Type</th>
                      <th class="px-3 py-2 font-semibold text-gray-700">Default</th>
                      <th class="px-3 py-2 font-semibold text-gray-700">Values</th>
                      <th class="px-3 py-2 font-semibold text-gray-700">Description</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="prop in activeComponent.props" :key="prop.name">
                      <tr class="border-b border-gray-100">
                        <td class="px-3 py-2 font-mono text-indigo-600 text-xs" x-text="prop.name"></td>
                        <td class="px-3 py-2 text-gray-500" x-text="prop.type"></td>
                        <td class="px-3 py-2 font-mono text-xs text-gray-500" x-text="prop.default"></td>
                        <td class="px-3 py-2">
                          <template x-if="prop.values">
                            <div class="flex flex-wrap gap-1">
                              <template x-for="v in prop.values" :key="v">
                                <span class="px-1.5 py-0.5 bg-gray-100 text-gray-600 rounded text-xs font-mono" x-text="v"></span>
                              </template>
                            </div>
                          </template>
                          <template x-if="!prop.values">
                            <span class="text-gray-400">-</span>
                          </template>
                        </td>
                        <td class="px-3 py-2 text-gray-600" x-text="prop.description"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </section>
            </template>

            <!-- Tokens -->
            <template x-if="activeComponent.tokens && activeComponent.tokens.length > 0">
              <section class="py-6">
                <h3 class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Tokens</h3>
                <div class="space-y-6">
                  <template x-for="group in activeComponent.tokens" :key="group.category">
                    <div>
                      <h4 class="text-xs font-semibold text-gray-500 mb-3" x-text="group.category"></h4>
                      <div>
                        <template x-for="item in group.items" :key="item.variant">
                          <div>
                            <div class="px-3 py-2 bg-[#f8f8fa]">
                              <span class="text-xs font-semibold text-gray-700" x-text="item.variant"></span>
                            </div>
                            <template x-for="(tokenVal, tokenKey) in item.tokens" :key="tokenKey">
                              <div class="flex items-center px-3 py-1.5 border-b border-gray-100">
                                <span class="w-40 shrink-0 text-xs text-gray-500" x-text="tokenKey"></span>
                                <code class="text-xs text-purple-700 bg-purple-50 px-2 py-0.5 rounded font-mono" x-text="tokenVal"></code>
                              </div>
                            </template>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </section>
            </template>

          </div>
        </div>
      </template>

    </main>
  </div>
</div>

<script>
function catalog() {
  return {
    search: '',
    activeComponentId: null,
    categories: [],
    components: [],
    cacheKey: Date.now(),

    async init() {
      try {
        const res = await fetch('components.json');
        const data = await res.json();
        this.categories = data.categories || [];
        this.components = data.components || [];
      } catch (e) {
        console.error('Failed to load components.json:', e);
      }
      this.updateFromHash();
      window.addEventListener('hashchange', () => this.updateFromHash());
    },

    updateFromHash() {
      const m = window.location.hash.match(/^#\/(.+)$/);
      this.activeComponentId = m ? m[1] : null;
      window.scrollTo(0, 0);
    },

    get activeComponent() {
      if (!this.activeComponentId) return null;
      return this.components.find(c => c.id === this.activeComponentId) || null;
    },

    get allComponentsSorted() {
      const ui = this.components.filter(c => c.category !== 'design-tokens').sort((a, b) => a.name.localeCompare(b.name));
      const tokens = this.components.filter(c => c.category === 'design-tokens').sort((a, b) => a.name.localeCompare(b.name));
      if (tokens.length > 0) tokens[0]._firstToken = true;
      return [...ui, ...tokens];
    },

    get filteredComponents() {
      return this.components.filter(c => {
        const q = this.search.toLowerCase();
        return !q
          || c.name.toLowerCase().includes(q)
          || (c.description || '').toLowerCase().includes(q)
          || c.category.toLowerCase().includes(q);
      });
    },

    get filteredUIComponents() {
      return this.filteredComponents.filter(c => c.category !== 'design-tokens').sort((a, b) => a.name.localeCompare(b.name));
    },

    get filteredTokenComponents() {
      return this.filteredComponents.filter(c => c.category === 'design-tokens').sort((a, b) => a.name.localeCompare(b.name));
    },

    getCategoryLabel(id) {
      const cat = this.categories.find(c => c.id === id);
      return cat ? cat.label : id;
    },

    resizeIframe(iframe) {
      const doResize = () => {
        try {
          const h = iframe.contentDocument.body.scrollHeight;
          iframe.style.height = h + 'px';
        } catch (e) {
          iframe.style.height = '400px';
        }
      };
      doResize();
      setTimeout(doResize, 500);
      setTimeout(doResize, 1500);
      try {
        const ro = new ResizeObserver(doResize);
        ro.observe(iframe.contentDocument.body);
      } catch (e) {
        setTimeout(doResize, 3000);
      }
    }
  };
}
</script>

</body>
</html>
