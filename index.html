<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lube Component Catalog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<div x-data="catalog()" x-init="init()" x-cloak>

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
      <a href="#/" class="text-xl font-bold shrink-0 hover:text-indigo-600 transition-colors">lube Component Catalog</a>
      <div class="flex items-center gap-3 flex-1 max-w-xl">
        <div class="relative flex-1">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input
            type="text"
            x-model="search"
            placeholder="Search components..."
            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          >
        </div>
      </div>
      <span class="text-sm text-gray-500 shrink-0" x-text="filteredComponents.length + ' components'"></span>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6 flex gap-6">

    <!-- Sidebar: Component List -->
    <aside class="w-48 shrink-0 hidden md:block">
      <nav class="sticky top-24 space-y-0.5 max-h-[calc(100vh-7rem)] overflow-y-auto">
        <template x-for="comp in allComponentsSorted" :key="comp.id">
          <div>
            <div x-show="comp._firstToken" class="border-t border-gray-200 my-2"></div>
            <a
              :href="'#/' + comp.id"
              :class="activeComponentId === comp.id ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-gray-600 hover:bg-gray-100'"
              class="block w-full text-left px-3 py-1.5 rounded-lg text-sm transition-colors truncate"
              x-text="comp.name"
            ></a>
          </div>
        </template>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 min-w-0">

      <!-- Mobile Component Selector -->
      <div class="md:hidden mb-4">
        <select
          @change="if ($event.target.value) { location.hash = '#/' + $event.target.value; $event.target.value = ''; }"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white"
        >
          <option value="">Jump to component...</option>
          <template x-for="comp in allComponentsSorted" :key="comp.id">
            <option :value="comp.id" x-text="comp.name"></option>
          </template>
        </select>
      </div>

      <!-- Landing View (no component selected) -->
      <template x-if="!activeComponent">
        <div class="space-y-10">

          <!-- UI Components Grid -->
          <template x-if="filteredUIComponents.length > 0">
            <div>
              <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">UI Components</h2>
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="comp in filteredUIComponents" :key="comp.id">
                  <a
                    :href="'#/' + comp.id"
                    class="block bg-white rounded-xl border border-gray-200 p-5 hover:border-indigo-300 hover:shadow-sm transition-all"
                  >
                    <div class="flex items-start justify-between gap-2 mb-2">
                      <h3 class="text-base font-semibold text-gray-900" x-text="comp.name"></h3>
                      <span class="shrink-0 px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs font-medium" x-text="getCategoryLabel(comp.category)"></span>
                    </div>
                    <p class="text-sm text-gray-500 line-clamp-2" x-text="comp.description"></p>
                  </a>
                </template>
              </div>
            </div>
          </template>

          <!-- Design Tokens Grid -->
          <template x-if="filteredTokenComponents.length > 0">
            <div>
              <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Design Tokens</h2>
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="comp in filteredTokenComponents" :key="comp.id">
                  <a
                    :href="'#/' + comp.id"
                    class="block bg-white rounded-xl border border-gray-200 p-5 hover:border-indigo-300 hover:shadow-sm transition-all"
                  >
                    <div class="flex items-start justify-between gap-2 mb-2">
                      <h3 class="text-base font-semibold text-gray-900" x-text="comp.name"></h3>
                      <span class="shrink-0 px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs font-medium" x-text="getCategoryLabel(comp.category)"></span>
                    </div>
                    <p class="text-sm text-gray-500 line-clamp-2" x-text="comp.description || ''"></p>
                  </a>
                </template>
              </div>
            </div>
          </template>

          <!-- Empty State -->
          <div x-show="filteredUIComponents.length === 0 && filteredTokenComponents.length === 0" class="text-center py-16">
            <p class="text-gray-400 text-sm">No components found.</p>
          </div>
        </div>
      </template>

      <!-- Component Detail View -->
      <template x-if="activeComponent">
        <div>
          <!-- Breadcrumb -->
          <div class="mb-4">
            <a href="#/" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-gray-700 transition-colors">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
              一覧
            </a>
          </div>

          <!-- Component Card -->
          <div class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">

            <!-- Component Header -->
            <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between gap-3">
              <div>
                <h2 class="text-base font-semibold" x-text="activeComponent.name"></h2>
              </div>
              <div class="flex items-center gap-2 shrink-0">
                <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs font-medium" x-text="getCategoryLabel(activeComponent.category)"></span>
                <template x-if="activeComponent.figmaUrl">
                  <a :href="activeComponent.figmaUrl" target="_blank" rel="noopener" class="inline-flex items-center gap-1 px-2.5 py-1 bg-purple-50 text-purple-700 rounded-md text-xs font-medium hover:bg-purple-100 transition-colors">
                    <svg class="w-3.5 h-3.5" viewBox="0 0 38 57" fill="currentColor"><path d="M19 28.5a9.5 9.5 0 1 1 19 0 9.5 9.5 0 0 1-19 0z"/><path d="M0 47.5A9.5 9.5 0 0 1 9.5 38H19v9.5a9.5 9.5 0 1 1-19 0z"/><path d="M19 0v19h9.5a9.5 9.5 0 1 0 0-19H19z"/><path d="M0 9.5A9.5 9.5 0 0 0 9.5 19H19V0H9.5A9.5 9.5 0 0 0 0 9.5z"/><path d="M0 28.5A9.5 9.5 0 0 0 9.5 38H19V19H9.5A9.5 9.5 0 0 0 0 28.5z"/></svg>
                    Figma
                  </a>
                </template>
              </div>
            </div>

            <!-- Tabs -->
            <div class="border-b border-gray-100">
              <div class="flex px-5 gap-4">
                <button
                  @click="activeTab = 'preview'"
                  :class="activeTab === 'preview' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                  class="py-2.5 text-sm font-medium border-b-2 transition-colors"
                >Preview</button>
                <template x-if="activeComponent.props && activeComponent.props.length > 0">
                  <button
                    @click="activeTab = 'props'"
                    :class="activeTab === 'props' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                    class="py-2.5 text-sm font-medium border-b-2 transition-colors"
                  >Props</button>
                </template>
                <template x-if="activeComponent.tokens && activeComponent.tokens.length > 0">
                  <button
                    @click="activeTab = 'tokens'"
                    :class="activeTab === 'tokens' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                    class="py-2.5 text-sm font-medium border-b-2 transition-colors"
                  >Tokens</button>
                </template>
              </div>
            </div>

            <!-- Tab Content -->
            <div>
              <!-- Preview Tab -->
              <div x-show="activeTab === 'preview'" class="p-0">
                <iframe
                  :src="activeComponent.preview + '?v=' + cacheKey"
                  class="w-full border-0"
                  :title="activeComponent.name + ' preview'"
                  @load="resizeIframe($event.target)"
                  style="min-height: 100px;"
                ></iframe>
              </div>

              <!-- Props Tab -->
              <div x-show="activeTab === 'props'" class="p-5">
                <table class="w-full text-sm">
                  <thead>
                    <tr class="text-left border-b border-gray-200">
                      <th class="pb-2 pr-4 font-semibold text-gray-700">Name</th>
                      <th class="pb-2 pr-4 font-semibold text-gray-700">Type</th>
                      <th class="pb-2 pr-4 font-semibold text-gray-700">Default</th>
                      <th class="pb-2 pr-4 font-semibold text-gray-700">Values</th>
                      <th class="pb-2 font-semibold text-gray-700">Description</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="prop in (activeComponent.props || [])" :key="prop.name">
                      <tr class="border-b border-gray-50">
                        <td class="py-2 pr-4 font-mono text-indigo-600 text-xs" x-text="prop.name"></td>
                        <td class="py-2 pr-4 text-gray-500" x-text="prop.type"></td>
                        <td class="py-2 pr-4 font-mono text-xs text-gray-500" x-text="prop.default"></td>
                        <td class="py-2 pr-4">
                          <template x-if="prop.values">
                            <div class="flex flex-wrap gap-1">
                              <template x-for="v in prop.values" :key="v">
                                <span class="px-1.5 py-0.5 bg-gray-100 text-gray-600 rounded text-xs font-mono" x-text="v"></span>
                              </template>
                            </div>
                          </template>
                          <template x-if="!prop.values">
                            <span class="text-gray-400">-</span>
                          </template>
                        </td>
                        <td class="py-2 text-gray-600" x-text="prop.description"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>

              <!-- Tokens Tab -->
              <div x-show="activeTab === 'tokens'" class="p-5">
                <template x-if="activeComponent.tokens && activeComponent.tokens.length > 0">
                  <div class="space-y-6">
                    <template x-for="group in activeComponent.tokens" :key="group.category">
                      <div>
                        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3" x-text="group.category"></h3>
                        <div class="space-y-3">
                          <template x-for="item in group.items" :key="item.variant">
                            <div class="border border-gray-100 rounded-lg overflow-hidden">
                              <div class="bg-gray-50 px-3 py-1.5 border-b border-gray-100">
                                <span class="text-xs font-semibold text-gray-700" x-text="item.variant"></span>
                              </div>
                              <div class="divide-y divide-gray-50">
                                <template x-for="(tokenVal, tokenKey) in item.tokens" :key="tokenKey">
                                  <div class="flex items-center px-3 py-1.5">
                                    <span class="w-40 shrink-0 text-xs text-gray-500" x-text="tokenKey"></span>
                                    <code class="text-xs text-purple-700 bg-purple-50 px-2 py-0.5 rounded font-mono" x-text="tokenVal"></code>
                                  </div>
                                </template>
                              </div>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </div>

          </div>
        </div>
      </template>

    </main>
  </div>
</div>

<script>
function catalog() {
  return {
    search: '',
    activeComponentId: null,
    activeTab: 'preview',
    categories: [],
    components: [],
    cacheKey: Date.now(),

    async init() {
      try {
        const res = await fetch('components.json');
        const data = await res.json();
        this.categories = data.categories || [];
        this.components = data.components || [];
      } catch (e) {
        console.error('Failed to load components.json:', e);
      }
      this.updateFromHash();
      window.addEventListener('hashchange', () => this.updateFromHash());
    },

    updateFromHash() {
      const m = window.location.hash.match(/^#\/(.+)$/);
      this.activeComponentId = m ? m[1] : null;
      this.activeTab = 'preview';
      window.scrollTo(0, 0);
    },

    get activeComponent() {
      if (!this.activeComponentId) return null;
      return this.components.find(c => c.id === this.activeComponentId) || null;
    },

    get allComponentsSorted() {
      const ui = this.components.filter(c => c.category !== 'design-tokens').sort((a, b) => a.name.localeCompare(b.name));
      const tokens = this.components.filter(c => c.category === 'design-tokens').sort((a, b) => a.name.localeCompare(b.name));
      if (tokens.length > 0) tokens[0]._firstToken = true;
      return [...ui, ...tokens];
    },

    get filteredComponents() {
      return this.components.filter(c => {
        const q = this.search.toLowerCase();
        return !q
          || c.name.toLowerCase().includes(q)
          || (c.description || '').toLowerCase().includes(q)
          || c.category.toLowerCase().includes(q);
      });
    },

    get filteredUIComponents() {
      return this.filteredComponents.filter(c => c.category !== 'design-tokens').sort((a, b) => a.name.localeCompare(b.name));
    },

    get filteredTokenComponents() {
      return this.filteredComponents.filter(c => c.category === 'design-tokens').sort((a, b) => a.name.localeCompare(b.name));
    },

    getCategoryLabel(id) {
      const cat = this.categories.find(c => c.id === id);
      return cat ? cat.label : id;
    },

    resizeIframe(iframe) {
      const doResize = () => {
        try {
          const h = iframe.contentDocument.documentElement.scrollHeight;
          iframe.style.height = h + 'px';
        } catch (e) {
          iframe.style.height = '400px';
        }
      };
      doResize();
      setTimeout(doResize, 500);
      setTimeout(doResize, 1500);
      setTimeout(doResize, 3000);
    }
  };
}
</script>

</body>
</html>
