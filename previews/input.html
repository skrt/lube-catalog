<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'primary': {
          DEFAULT: '#0a0ac2',
          hover: '#080892',
          content: '#f3f4fe',
        },
        'secondary': {
          DEFAULT: '#e8e8fd',
          hover: '#e0e0f5',
          content: '#0a0ac2',
        },
        'base-content': 'rgb(16 16 22 / <alpha-value>)',
        'base-200': '#f8f8fa',
        'base-300': '#eeeef2',
        'error': {
          DEFAULT: '#c94043',
          hover: '#b7393c',
          content: '#fff5f5',
          'bg': '#f7e2e3',
        },
        'success': {
          DEFAULT: '#479d72',
          content: '#f5fef9',
          'bg': '#e3f0ea',
        },
        'warning': {
          DEFAULT: '#de781f',
          content: '#fffcf8',
          'bg': '#faebdd',
        },
        'info': {
          DEFAULT: '#535671',
          content: '#f2f4ff',
          'bg': '#e5e6ea',
        },
      },
      borderRadius: {
        'sm': '4px',
      },
      boxShadow: {
        'border-base-content-5': 'inset 0 0 0 1px rgba(16, 16, 22, 0.05)',
        'border-base-content-10': 'inset 0 0 0 1px rgba(16, 16, 22, 0.1)',
        'border-base-content-20': 'inset 0 0 0 1px rgba(16, 16, 22, 0.2)',
        'border-2-base-content-10': 'inset 0 0 0 2px rgba(16, 16, 22, 0.1)',
        'border-2-base-content-20': 'inset 0 0 0 2px rgba(16, 16, 22, 0.2)',
        'border-primary': 'inset 0 0 0 1px #0a0ac2',
        'border-2-primary': 'inset 0 0 0 2px #0a0ac2',
        'border-error': 'inset 0 0 0 1px #c94043',
        'border-2-error': 'inset 0 0 0 2px #c94043',
      },
    },
  },
};
</script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 24px 24px !important; min-height: 100vh !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <div class="space-y-10">

    <!-- Sizes -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Sizes</p>
      <div class="flex flex-wrap items-end gap-6">
        <div class="w-56 space-y-1">
          <label class="block text-xs text-base-content">sm</label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-6 px-2 py-1 text-xs rounded bg-white border border-base-content/20 placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
        <div class="w-56 space-y-1">
          <label class="block text-sm text-base-content">md</label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-8 px-3 py-2 text-sm rounded bg-white border border-base-content/20 placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
        <div class="w-56 space-y-1">
          <label class="block text-base text-base-content">lg</label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-10 px-3 py-2 text-base rounded bg-white border border-base-content/20 placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
      </div>
    </div>

    <!-- States -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>States</p>
      <div class="flex flex-wrap items-start gap-4">
        <div class="w-52 space-y-1">
          <label class="block text-sm text-base-content">Default</label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-8 px-3 py-2 text-sm rounded bg-white border border-base-content/20 placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
        <div class="w-52 space-y-1">
          <label class="block text-sm text-base-content">Focus</label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-8 px-3 py-2 text-sm rounded bg-white border-2 border-primary placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
        <div class="w-52 space-y-1">
          <label class="block text-sm text-base-content">Error</label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-8 px-3 py-2 text-sm rounded bg-white border-2 border-error placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
        <div class="w-52 space-y-1">
          <label class="block text-sm text-base-content">Disabled</label>
          <input type="text" placeholder="プレースホルダー" disabled class="w-full h-8 px-3 py-2 text-sm rounded bg-base-200 border border-base-content/10 placeholder:text-base-content/30 text-base-content outline-none cursor-not-allowed">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
        <div class="w-52 space-y-1">
          <label class="block text-sm text-base-content">Filled</label>
          <input type="text" value="プレースホルダー" class="w-full h-8 px-3 py-2 text-sm rounded bg-white border border-base-content/20 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
      </div>
    </div>

    <!-- Required -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Required</p>
      <div class="flex flex-wrap items-start gap-6">
        <div class="w-56 space-y-1">
          <label class="block text-sm text-base-content">Default <span class="text-error">*</span></label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-8 px-3 py-2 text-sm rounded bg-white border border-base-content/20 placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
        <div class="w-56 space-y-1">
          <label class="block text-sm text-base-content">Error <span class="text-error">*</span></label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-8 px-3 py-2 text-sm rounded bg-white border-2 border-error placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-error">入力しましょう</p>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
