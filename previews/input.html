<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
@theme {
  --color-primary: #0a0ac2;
  --color-primary-hover: #080892;
  --color-primary-content: #f3f4fe;
  --color-secondary: #e8e8fd;
  --color-secondary-hover: #e0e0f5;
  --color-secondary-content: #0a0ac2;
  --color-base-content: #101016;
  --color-base-200: #f8f8fa;
  --color-base-300: #eeeef2;
  --color-error: #c94043;
  --color-error-hover: #b7393c;
  --color-error-content: #fff5f5;
  --color-error-bg: #f7e2e3;
  --color-success: #479d72;
  --color-success-content: #f5fef9;
  --color-success-bg: #e3f0ea;
  --color-warning: #de781f;
  --color-warning-content: #fffcf8;
  --color-warning-bg: #faebdd;
  --color-info: #535671;
  --color-info-content: #f2f4ff;
  --color-info-bg: #e5e6ea;
  --radius-sm: 4px;
  --shadow-border-base-content-5: inset 0 0 0 1px rgba(16, 16, 22, 0.05);
  --shadow-border-base-content-10: inset 0 0 0 1px rgba(16, 16, 22, 0.1);
  --shadow-border-base-content-20: inset 0 0 0 1px rgba(16, 16, 22, 0.2);
  --shadow-border-2-base-content-10: inset 0 0 0 2px rgba(16, 16, 22, 0.1);
  --shadow-border-2-base-content-20: inset 0 0 0 2px rgba(16, 16, 22, 0.2);
  --shadow-border-primary: inset 0 0 0 1px #0a0ac2;
  --shadow-border-2-primary: inset 0 0 0 2px #0a0ac2;
  --shadow-border-error: inset 0 0 0 1px #c94043;
  --shadow-border-2-error: inset 0 0 0 2px #c94043;
}
</style>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; min-height: 100vh !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <div class="space-y-10">

    <!-- Sizes -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Sizes</p>
      <div class="flex flex-wrap items-end gap-6">
        <div class="w-56 space-y-1">
          <label class="block text-xs text-base-content">sm</label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-6 px-2 py-1 text-xs rounded-md bg-white border border-base-content/20 placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
        <div class="w-56 space-y-1">
          <label class="block text-sm text-base-content">md</label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-8 px-3 py-2 text-sm rounded-md bg-white border border-base-content/20 placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
        <div class="w-56 space-y-1">
          <label class="block text-base text-base-content">lg</label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-10 px-3 py-2 text-base rounded-md bg-white border border-base-content/20 placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
      </div>
    </div>

    <!-- States -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>States</p>
      <div class="flex flex-wrap items-start gap-4">
        <div class="w-52 space-y-1">
          <label class="block text-sm text-base-content">Default</label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-8 px-3 py-2 text-sm rounded-md bg-white border border-base-content/20 placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
        <div class="w-52 space-y-1">
          <label class="block text-sm text-base-content">Focus</label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-8 px-3 py-2 text-sm rounded-md bg-white border-2 border-primary placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
        <div class="w-52 space-y-1">
          <label class="block text-sm text-base-content">Error</label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-8 px-3 py-2 text-sm rounded-md bg-white border-2 border-error placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
        <div class="w-52 space-y-1">
          <label class="block text-sm text-base-content">Disabled</label>
          <input type="text" placeholder="プレースホルダー" disabled class="w-full h-8 px-3 py-2 text-sm rounded-md bg-base-200 border border-base-content/10 placeholder:text-base-content/30 text-base-content outline-none cursor-not-allowed">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
        <div class="w-52 space-y-1">
          <label class="block text-sm text-base-content">Filled</label>
          <input type="text" value="プレースホルダー" class="w-full h-8 px-3 py-2 text-sm rounded-md bg-white border border-base-content/20 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
      </div>
    </div>

    <!-- Required -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Required</p>
      <div class="flex flex-wrap items-start gap-6">
        <div class="w-56 space-y-1">
          <label class="block text-sm text-base-content">Default <span class="text-error">*</span></label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-8 px-3 py-2 text-sm rounded-md bg-white border border-base-content/20 placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
        </div>
        <div class="w-56 space-y-1">
          <label class="block text-sm text-base-content">Error <span class="text-error">*</span></label>
          <input type="text" placeholder="プレースホルダー" class="w-full h-8 px-3 py-2 text-sm rounded-md bg-white border-2 border-error placeholder:text-base-content/30 text-base-content outline-none">
          <p class="text-xs text-error">入力しましょう</p>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
