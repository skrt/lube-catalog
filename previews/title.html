<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
@theme {
  --color-primary: #0a0ac2;
  --color-primary-hover: #080892;
  --color-primary-content: #f3f4fe;
  --color-secondary: #e8e8fd;
  --color-secondary-hover: #e0e0f5;
  --color-secondary-content: #0a0ac2;
  --color-base-content: #101016;
  --color-base-200: #f8f8fa;
  --color-base-300: #eeeef2;
  --color-danger: #c94043;
  --color-danger-hover: #b7393c;
  --color-danger-content: #fff5f5;
  --color-danger-soft: #fff5f5;
  --color-success: #479d72;
  --color-success-content: #f5fef9;
  --color-success-soft: #f5fef9;
  --color-warning: #de781f;
  --color-warning-content: #fffcf8;
  --color-warning-soft: #fffcf8;
  --color-info: #535671;
  --color-info-content: #f2f4ff;
  --color-info-soft: #f2f4ff;
  --radius-sm: 4px;
  --shadow-border-base-content-5: inset 0 0 0 1px rgba(16, 16, 22, 0.05);
  --shadow-border-base-content-10: inset 0 0 0 1px rgba(16, 16, 22, 0.1);
  --shadow-border-base-content-20: inset 0 0 0 1px rgba(16, 16, 22, 0.2);
  --shadow-border-2-base-content-10: inset 0 0 0 2px rgba(16, 16, 22, 0.1);
  --shadow-border-2-base-content-20: inset 0 0 0 2px rgba(16, 16, 22, 0.2);
  --shadow-border-primary: inset 0 0 0 1px #0a0ac2;
  --shadow-border-2-primary: inset 0 0 0 2px #0a0ac2;
  --shadow-border-danger: inset 0 0 0 1px #c94043;
  --shadow-border-2-danger: inset 0 0 0 2px #c94043;
}
</style>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; min-height: 100vh !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8 space-y-10">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    Title — ページ/セクション見出し＋右にアクションボタン群
      Type: Page / Section / Sub
      Layout: flex items-center gap-6, w-full

    Page:    text-3xl(30px) font-semibold leading-9(36px) text-base-content
             Actions: Button lg (h-10 px-4 py-2.5 text-sm font-semibold rounded-md)
             Actions なしの場合は container に min-h-10(40px) を付け、ボタン有り時（lg Button=h-10=40px）と行高を揃える
    Section: text-xl(20px) font-semibold leading-7(28px) text-base-content
             Actions: Button md (h-8 px-3 py-2 text-xs font-semibold rounded-md)
    Sub:     text-base(16px) font-semibold leading-6(24px) text-base-content
             Actions: Button md (h-8 px-3 py-2 text-xs font-semibold rounded-md)
  -->

  <!-- Types -->
  <section>
    <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4">Types</p>
    <div class="flex flex-col gap-8">

      <!-- Page (3 buttons) -->
      <div class="flex items-start gap-4">
        <p class="shrink-0 w-20 pt-1 text-[10px] text-gray-400">Page (3)</p>
        <div class="flex-1 flex gap-6 items-center">
          <p class="flex-1 min-w-0 text-3xl font-semibold leading-9 text-base-content">タイトル</p>
          <div class="flex gap-2 items-center shrink-0">
            <button class="flex items-center justify-center gap-2 h-10 px-4 py-2.5 text-sm font-semibold text-base-content rounded-md bg-base-200 border border-base-content/5">複製</button>
            <button class="flex items-center justify-center gap-2 h-10 px-4 py-2.5 text-sm font-semibold text-base-content rounded-md bg-base-200 border border-base-content/5">PDFダウンロード</button>
            <button class="flex items-center justify-center gap-2 h-10 px-4 py-2.5 text-sm font-semibold text-primary-content rounded-md bg-primary border border-base-content/5">編集</button>
          </div>
        </div>
      </div>

      <!-- Page (4 buttons) -->
      <div class="flex items-start gap-4">
        <p class="shrink-0 w-20 pt-1 text-[10px] text-gray-400">Page (4)</p>
        <div class="flex-1 flex gap-6 items-center">
          <p class="flex-1 min-w-0 text-3xl font-semibold leading-9 text-base-content">タイトル</p>
          <div class="flex gap-2 items-center shrink-0">
            <button class="flex items-center justify-center gap-2 h-10 px-4 py-2.5 text-sm font-semibold text-base-content rounded-md bg-base-200 border border-base-content/5">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
              削除
            </button>
            <button class="flex items-center justify-center gap-2 h-10 px-4 py-2.5 text-sm font-semibold text-base-content rounded-md bg-base-200 border border-base-content/5">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
              複製
            </button>
            <button class="flex items-center justify-center gap-2 h-10 px-4 py-2.5 text-sm font-semibold text-primary-content rounded-md bg-primary border border-base-content/5">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>
              編集
            </button>
            <button class="flex items-center justify-center gap-2 h-10 px-4 py-2.5 text-sm font-semibold text-primary-content rounded-md bg-primary border border-base-content/5">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
              PDFダウンロード
            </button>
          </div>
        </div>
      </div>

      <!-- Page (no actions): ボタン無しでも min-h-10(40px) で行高を維持（遷移時のガタつき防止） -->
      <div class="flex items-start gap-4">
        <p class="shrink-0 w-20 pt-1 text-[10px] text-gray-400">Page (0)</p>
        <div class="flex-1 flex gap-6 items-center min-h-10">
          <p class="flex-1 min-w-0 text-3xl font-semibold leading-9 text-base-content">タイトル</p>
        </div>
      </div>

      <!-- Section -->
      <div class="flex items-start gap-4">
        <p class="shrink-0 w-20 pt-0.5 text-[10px] text-gray-400">Section</p>
        <div class="flex-1 flex gap-6 items-center">
          <p class="flex-1 min-w-0 text-xl font-semibold leading-7 text-base-content">タイトル</p>
          <div class="flex gap-2 items-center shrink-0">
            <button class="flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold text-base-content rounded-md bg-base-200 border border-base-content/5">ボタン</button>
            <button class="flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold text-primary-content rounded-md bg-primary border border-base-content/5">ボタン</button>
          </div>
        </div>
      </div>

      <!-- Sub -->
      <div class="flex items-start gap-4">
        <p class="shrink-0 w-20 pt-0.5 text-[10px] text-gray-400">Sub</p>
        <div class="flex-1 flex gap-6 items-center">
          <p class="flex-1 min-w-0 text-base font-semibold leading-6 text-base-content">タイトル</p>
          <div class="flex gap-2 items-center shrink-0">
            <button class="flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold text-base-content rounded-md bg-base-200 border border-base-content/5">ボタン</button>
            <button class="flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold text-primary-content rounded-md bg-primary border border-base-content/5">ボタン</button>
          </div>
        </div>
      </div>

    </div>
  </section>

</body>
</html>
