<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
@theme {
  --color-primary: #0a0ac2;
  --color-primary-hover: #080892;
  --color-primary-content: #f3f4fe;
  --color-secondary: #e8e8fd;
  --color-secondary-hover: #e0e0f5;
  --color-secondary-content: #0a0ac2;
  --color-base-content: #101016;
  --color-base-200: #f8f8fa;
  --color-base-300: #eeeef2;
  --color-error: #c94043;
  --color-error-hover: #b7393c;
  --color-error-content: #fff5f5;
  --color-error-bg: #f7e2e3;
  --color-success: #479d72;
  --color-success-content: #f5fef9;
  --color-success-bg: #e3f0ea;
  --color-warning: #de781f;
  --color-warning-content: #fffcf8;
  --color-warning-bg: #faebdd;
  --color-info: #535671;
  --color-info-content: #f2f4ff;
  --color-info-bg: #e5e6ea;
  --radius-sm: 4px;
  --shadow-border-base-content-5: inset 0 0 0 1px rgba(16, 16, 22, 0.05);
  --shadow-border-base-content-10: inset 0 0 0 1px rgba(16, 16, 22, 0.1);
  --shadow-border-base-content-20: inset 0 0 0 1px rgba(16, 16, 22, 0.2);
  --shadow-border-2-base-content-10: inset 0 0 0 2px rgba(16, 16, 22, 0.1);
  --shadow-border-2-base-content-20: inset 0 0 0 2px rgba(16, 16, 22, 0.2);
  --shadow-border-primary: inset 0 0 0 1px #0a0ac2;
  --shadow-border-2-primary: inset 0 0 0 2px #0a0ac2;
  --shadow-border-error: inset 0 0 0 1px #c94043;
  --shadow-border-2-error: inset 0 0 0 2px #c94043;
}
</style>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; min-height: 100vh !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    Primary: bg #0a0ac2, text #f3f4fe
    Success: bg #479d72, text #f5fef9
    Warning: bg #de781f, text #fffcf8
    Error:   bg #c94043, text #fff5f5
    Info:    bg #535671, text #f2f4ff
    Shape:   rounded-full (pill)
    Sizes:   lg (px-2.5 py-0.5 text-sm leading-5) / md (px-2 py-0.5 text-xs leading-4) / sm (px-1.5 py-0 text-xs leading-4)
  -->

  <div class="space-y-10">

    <!-- Color Variants (lg size) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Color</p>
      <div class="flex flex-wrap items-center gap-4">
        <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-primary-content rounded-full bg-primary">Primary</span>
        <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-success-content rounded-full bg-success">Success</span>
        <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-warning-content rounded-full bg-warning">Warning</span>
        <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-error-content rounded-full bg-error">Error</span>
        <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-info-content rounded-full bg-info">Info</span>
      </div>
    </div>

    <!-- Sizes (Primary) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Sizes</p>
      <div class="flex flex-wrap items-end gap-4">
        <span class="inline-flex items-center justify-center px-1.5 py-0 text-xs leading-4 text-primary-content rounded-full bg-primary">sm</span>
        <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs leading-4 text-primary-content rounded-full bg-primary">md</span>
        <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-primary-content rounded-full bg-primary">lg</span>
      </div>
    </div>

    <!-- All Colors × All Sizes Matrix -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>All Colors × All Sizes</p>
      <div class="space-y-3">
        <!-- sm row -->
        <div class="flex items-center gap-3">
          <span class="text-[10px] text-gray-400 w-8">sm</span>
          <span class="inline-flex items-center justify-center px-1.5 py-0 text-xs leading-4 text-primary-content rounded-full bg-primary">Primary</span>
          <span class="inline-flex items-center justify-center px-1.5 py-0 text-xs leading-4 text-success-content rounded-full bg-success">Success</span>
          <span class="inline-flex items-center justify-center px-1.5 py-0 text-xs leading-4 text-warning-content rounded-full bg-warning">Warning</span>
          <span class="inline-flex items-center justify-center px-1.5 py-0 text-xs leading-4 text-error-content rounded-full bg-error">Error</span>
          <span class="inline-flex items-center justify-center px-1.5 py-0 text-xs leading-4 text-info-content rounded-full bg-info">Info</span>
        </div>
        <!-- md row -->
        <div class="flex items-center gap-3">
          <span class="text-[10px] text-gray-400 w-8">md</span>
          <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs leading-4 text-primary-content rounded-full bg-primary">Primary</span>
          <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs leading-4 text-success-content rounded-full bg-success">Success</span>
          <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs leading-4 text-warning-content rounded-full bg-warning">Warning</span>
          <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs leading-4 text-error-content rounded-full bg-error">Error</span>
          <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs leading-4 text-info-content rounded-full bg-info">Info</span>
        </div>
        <!-- lg row -->
        <div class="flex items-center gap-3">
          <span class="text-[10px] text-gray-400 w-8">lg</span>
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-primary-content rounded-full bg-primary">Primary</span>
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-success-content rounded-full bg-success">Success</span>
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-warning-content rounded-full bg-warning">Warning</span>
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-error-content rounded-full bg-error">Error</span>
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-info-content rounded-full bg-info">Info</span>
        </div>
      </div>
    </div>

    <!-- Usage Examples -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Usage Examples</p>
      <div class="flex flex-wrap items-center gap-4">
        <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-success-content rounded-full bg-success">リピート</span>
        <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-warning-content rounded-full bg-warning">新規発注</span>
        <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-warning-content rounded-full bg-warning">未送付</span>
        <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-info-content rounded-full bg-info">送付済み</span>
      </div>
    </div>

  </div>

</body>
</html>
