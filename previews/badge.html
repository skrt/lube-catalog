<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    Primary: bg #0a0ac2, text #f3f4fe
    Success: bg #479d72, text #f5fef9
    Warning: bg #de781f, text #fffcf8
    Error:   bg #c94043, text #fff5f5
    Info:    bg #535671, text #f2f4ff
    Shape:   rounded-full (pill)
    Sizes:   lg (px-2.5 py-0.5 text-sm leading-5) / md (px-2 py-0.5 text-xs leading-4) / sm (px-1.5 py-0 text-xs leading-4)
  -->

  <div class="space-y-10">

    <!-- Color Variants (lg size) -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Color Variants</p>
      <div class="flex flex-wrap items-center gap-4">
        <div class="text-center space-y-1.5">
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#f3f4fe] rounded-full bg-[#0a0ac2]">ラベル</span>
          <p class="text-[10px] text-gray-400">Primary</p>
        </div>
        <div class="text-center space-y-1.5">
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#f5fef9] rounded-full bg-[#479d72]">ラベル</span>
          <p class="text-[10px] text-gray-400">Success</p>
        </div>
        <div class="text-center space-y-1.5">
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#fffcf8] rounded-full bg-[#de781f]">ラベル</span>
          <p class="text-[10px] text-gray-400">Warning</p>
        </div>
        <div class="text-center space-y-1.5">
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#fff5f5] rounded-full bg-[#c94043]">ラベル</span>
          <p class="text-[10px] text-gray-400">Error</p>
        </div>
        <div class="text-center space-y-1.5">
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#f2f4ff] rounded-full bg-[#535671]">ラベル</span>
          <p class="text-[10px] text-gray-400">Info</p>
        </div>
      </div>
    </div>

    <!-- Sizes (Primary) -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Sizes</p>
      <div class="flex flex-wrap items-end gap-4">
        <div class="text-center space-y-1.5">
          <span class="inline-flex items-center justify-center px-1.5 py-0 text-xs leading-4 text-[#f3f4fe] rounded-full bg-[#0a0ac2]">ラベル</span>
          <p class="text-[10px] text-gray-400">sm</p>
        </div>
        <div class="text-center space-y-1.5">
          <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs leading-4 text-[#f3f4fe] rounded-full bg-[#0a0ac2]">ラベル</span>
          <p class="text-[10px] text-gray-400">md</p>
        </div>
        <div class="text-center space-y-1.5">
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#f3f4fe] rounded-full bg-[#0a0ac2]">ラベル</span>
          <p class="text-[10px] text-gray-400">lg</p>
        </div>
      </div>
    </div>

    <!-- All Colors × All Sizes Matrix -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">All Colors × All Sizes</p>
      <div class="space-y-3">
        <!-- sm row -->
        <div class="flex items-center gap-3">
          <span class="text-[10px] text-gray-400 w-8">sm</span>
          <span class="inline-flex items-center justify-center px-1.5 py-0 text-xs leading-4 text-[#f3f4fe] rounded-full bg-[#0a0ac2]">ラベル</span>
          <span class="inline-flex items-center justify-center px-1.5 py-0 text-xs leading-4 text-[#f5fef9] rounded-full bg-[#479d72]">ラベル</span>
          <span class="inline-flex items-center justify-center px-1.5 py-0 text-xs leading-4 text-[#fffcf8] rounded-full bg-[#de781f]">ラベル</span>
          <span class="inline-flex items-center justify-center px-1.5 py-0 text-xs leading-4 text-[#fff5f5] rounded-full bg-[#c94043]">ラベル</span>
          <span class="inline-flex items-center justify-center px-1.5 py-0 text-xs leading-4 text-[#f2f4ff] rounded-full bg-[#535671]">ラベル</span>
        </div>
        <!-- md row -->
        <div class="flex items-center gap-3">
          <span class="text-[10px] text-gray-400 w-8">md</span>
          <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs leading-4 text-[#f3f4fe] rounded-full bg-[#0a0ac2]">ラベル</span>
          <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs leading-4 text-[#f5fef9] rounded-full bg-[#479d72]">ラベル</span>
          <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs leading-4 text-[#fffcf8] rounded-full bg-[#de781f]">ラベル</span>
          <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs leading-4 text-[#fff5f5] rounded-full bg-[#c94043]">ラベル</span>
          <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs leading-4 text-[#f2f4ff] rounded-full bg-[#535671]">ラベル</span>
        </div>
        <!-- lg row -->
        <div class="flex items-center gap-3">
          <span class="text-[10px] text-gray-400 w-8">lg</span>
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#f3f4fe] rounded-full bg-[#0a0ac2]">ラベル</span>
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#f5fef9] rounded-full bg-[#479d72]">ラベル</span>
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#fffcf8] rounded-full bg-[#de781f]">ラベル</span>
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#fff5f5] rounded-full bg-[#c94043]">ラベル</span>
          <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#f2f4ff] rounded-full bg-[#535671]">ラベル</span>
        </div>
      </div>
    </div>

    <!-- Usage Examples -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Usage Examples</p>
      <div class="flex flex-wrap items-center gap-4">
        <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#f5fef9] rounded-full bg-[#479d72]">リピート</span>
        <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#fffcf8] rounded-full bg-[#de781f]">新規発注</span>
        <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#fffcf8] rounded-full bg-[#de781f]">未送付</span>
        <span class="inline-flex items-center justify-center px-2.5 py-0.5 text-sm leading-5 text-[#f2f4ff] rounded-full bg-[#535671]">送付済み</span>
      </div>
    </div>

  </div>

</body>
</html>
