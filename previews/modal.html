  <!--
    Design Tokens (from Figma):
    Scrim:    bg-black/50
    Dialog:   bg-white, rounded-xl (12px), Size sm=max-w-sm(384px)/lg=max-w-lg(512px)（プレビューは sm 相当の w-96）, drop-shadow。Close Icon（Header右端の×）は optional・既定OFF、置く場合は IconButton(sm/Tertiary・x)
    Header:   pt-6 px-6, text-lg (18px) font-semibold leading-7 (28px), text-base-content
    ×/キャンセルの表示ルール（役割で排他・両方置かない）:
      - 確認系（削除確認・送付確認など選択を迫る）= ×なし・フッター＝キャンセル(+否定選択肢)＋実行CTA
      - 作業/閲覧系（フォーム・選択リスト・エラー修正など）= ×あり(IconButton sm/Tertiary)・フッター＝実行CTAのみ（キャンセルは置かない）
    Content:  px-6 py-4, text-sm (14px) leading-5, text-base-content/60
    Footer:   px-6 py-4 gap-3, justify-end
              Count text (optional): text-sm, text-base-content/60
              Buttons: md size (h-8 px-3 py-2 text-xs font-semibold rounded-md)
    Behavior (shizai-pro):
      - opacity 0 → 1 (200ms) for backdrop
      - opacity 0 + scale-95 → opacity 1 + scale-100 (200ms) for panel
      - backdrop click closes
  -->

    <!-- Close Icon (作業/閲覧系) -->

      <div class="bg-gray-100 p-8 rounded-lg flex justify-center">
        <div class="w-96 rounded-xl bg-white shadow-[0_16px_16px_rgba(0,0,0,0.18)] flex flex-col">
          <div class="flex items-start gap-2 pt-6 px-6">
            <p class="flex-1 min-w-0 text-lg font-semibold leading-7 text-base-content">ダイアログタイトル</p>
            <button class="inline-flex items-center justify-center w-6 h-6 rounded-md bg-base-200 border border-base-content/5 hover:bg-base-300 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 shrink-0">

            </button>
          </div>

          </div>
          <div class="flex items-center justify-end gap-3 px-6 pt-0 pb-6">
            <button class="inline-flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold text-primary-content rounded-md bg-primary border border-base-content/5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">保存</button>

    <!-- Footer -->

      <div class="flex flex-wrap items-start gap-4">

        <div>

            <div class="flex items-center justify-end gap-3 px-6 pt-0 pb-6">
              <button class="inline-flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold text-base-content rounded-md bg-base-200 border border-base-content/5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">キャンセル</button>
              <button class="inline-flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold text-primary-content rounded-md bg-primary border border-base-content/5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">承認</button>
            </div>
          </div>
          <p class="text-[10px] text-gray-400 mt-1 ml-1">Without count</p>
        </div>

        <div>
          <div class="w-96 rounded-xl bg-white border border-gray-200">
            <div class="flex items-center justify-end gap-3 px-6 pt-0 pb-6">
              <p class="flex-1 text-sm leading-5 text-base-content/60">0件選択中</p>
              <button class="inline-flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold text-base-content rounded-md bg-base-200 border border-base-content/5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">キャンセル</button>
              <button class="inline-flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold text-primary-content rounded-md bg-primary border border-base-content/5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">承認</button>
            </div>
          </div>
          <p class="text-[10px] text-gray-400 mt-1 ml-1">With count</p>
        </div>

        <div>
          <div class="w-96 rounded-xl bg-white border border-gray-200">
            <div class="flex items-center justify-end gap-3 px-6 pt-0 pb-6">
              <button class="inline-flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold text-base-content rounded-md bg-base-200 border border-base-content/5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">キャンセル</button>
              <button class="inline-flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold text-danger-content rounded-md bg-danger border border-base-content/5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">削除</button>

    <!-- Examples -->
    <div id="examples-section">
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4">確認ダイアログ</p>
      <div class="bg-gray-100 p-8 rounded-lg flex justify-center">
        <div class="w-96 rounded-xl bg-white shadow-[0_16px_16px_rgba(0,0,0,0.18)] flex flex-col">
          <div class="flex flex-col gap-2 pt-6 px-6">
            <p class="text-lg font-semibold leading-7 text-base-content">ダイアログタイトル</p>

            <button class="inline-flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold text-primary-content rounded-md bg-primary border border-base-content/5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">承認</button>

  <!-- Modal Container -->
  <div id="modal-container" data-demo-keep class="hidden fixed inset-0 z-50 flex items-center justify-center" onclick="onContainerClick(event)">
    <div id="modal-backdrop" class="absolute inset-0 bg-black/50 opacity-0 transition-opacity duration-200"></div>
    <div id="modal-panel" class="relative w-96 rounded-xl bg-white shadow-[0_16px_16px_rgba(0,0,0,0.18)] flex flex-col opacity-0 scale-95 transition-all duration-200">
      <div class="flex flex-col gap-2 pt-6 px-6">
        <p id="modal-title" class="text-lg font-semibold leading-7 text-base-content"></p>
      </div>
      <div class="flex flex-col gap-2 px-6 py-4">
        <p id="modal-body" class="text-sm leading-5 text-base-content/60"></p>
      </div>
      <div class="flex items-center justify-end gap-3 px-6 pt-0 pb-6">
        <button onclick="closeModal()" class="inline-flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold text-base-content rounded-md bg-base-200 border border-base-content/5 hover:bg-base-300 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">キャンセル</button>
        <button id="modal-confirm" onclick="closeModal()" class="inline-flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold rounded-md border border-base-content/5 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"></button>
      </div>
    </div>
  </div>

  <script>
    const MODAL_PRESETS = {
      confirm: {
        title: 'ダイアログタイトル',
        body: 'この操作を実行してよろしいですか？この操作は取り消せません',
        confirmLabel: '承認',
        confirmClass: 'text-primary-content bg-primary hover:bg-primary-hover'
      },
      delete: {
        title: '本当に削除しますか？',
        body: 'この操作は取り消せません。関連するデータも削除されます',
        confirmLabel: '削除',
        confirmClass: 'text-danger-content bg-danger hover:bg-danger-hover'
      }
    };

    function openModal(type) {
      const cfg = MODAL_PRESETS[type];
      document.getElementById('modal-title').textContent = cfg.title;
      document.getElementById('modal-body').textContent = cfg.body;
      const confirmBtn = document.getElementById('modal-confirm');
      confirmBtn.textContent = cfg.confirmLabel;
      confirmBtn.className = 'inline-flex items-center justify-center gap-2 h-8 px-3 py-2 text-xs font-semibold rounded-md border border-base-content/5 transition-colors ' + cfg.confirmClass;

      const container = document.getElementById('modal-container');
      container.classList.remove('hidden');
      requestAnimationFrame(() => {
        document.getElementById('modal-backdrop').classList.replace('opacity-0', 'opacity-100');
        const panel = document.getElementById('modal-panel');
        panel.classList.replace('opacity-0', 'opacity-100');
        panel.classList.replace('scale-95', 'scale-100');
        // Focus first button in dialog
        const firstBtn = panel.querySelector('button');
        if (firstBtn) setTimeout(() => firstBtn.focus(), 100);
      });
    }

    function closeModal() {
      document.getElementById('modal-backdrop').classList.replace('opacity-100', 'opacity-0');
      const panel = document.getElementById('modal-panel');
      panel.classList.replace('opacity-100', 'opacity-0');
      panel.classList.replace('scale-100', 'scale-95');
      setTimeout(() => document.getElementById('modal-container').classList.add('hidden'), 200);
    }

    function onContainerClick(event) {
      if (event.target.id === 'modal-backdrop' || event.target.id === 'modal-container') {
        closeModal();
      }
    }

    document.addEventListener('keydown', (e) => {
      const container = document.getElementById('modal-container');
      if (container.classList.contains('hidden')) return;
      if (e.key === 'Escape') {
        closeModal();
        return;
      }
      // Focus trap
      if (e.key === 'Tab') {
        e.preventDefault();
        const panel = document.getElementById('modal-panel');
        const focusable = Array.from(panel.querySelectorAll('button:not([disabled])'));
        if (focusable.length === 0) return;
        const idx = focusable.indexOf(document.activeElement);
        if (e.shiftKey) {
          focusable[idx <= 0 ? focusable.length - 1 : idx - 1].focus();
        } else {
          focusable[idx >= focusable.length - 1 ? 0 : idx + 1].focus();
        }
      }
    });
  </script>

</body>
