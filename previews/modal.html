<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../tailwind.config.js"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 24px 24px !important; min-height: 400px !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    Scrim:    bg-black/50
    Dialog:   bg-white, rounded-xl (12px), w-96, drop-shadow
    Header:   pt-6 px-6, text-lg (18px) semibold leading-7 (28px), text-base-content
    Content:  px-6 py-4, text-sm (14px) leading-5, text-base-content/60
    Footer:   px-6 py-4 gap-3, justify-end
              Count text (optional): text-sm, text-base-content/60
              Buttons: md size (px-3 py-2 text-xs semibold rounded-sm)
    Behavior (shizai-pro):
      - opacity 0 → 1 (200ms) for backdrop
      - opacity 0 + scale-95 → opacity 1 + scale-100 (200ms) for panel
      - backdrop click closes
  -->

  <div class="space-y-14">

    <!-- Demo -->
    <div id="demo-section">
      <p class="text-sm text-gray-500 mb-4">ボタンを押すとモーダルが開きます（背景クリック・キャンセルで閉じる）</p>
      <div class="flex flex-wrap items-center gap-3">
        <button
          onclick="openModal('confirm')"
          class="inline-flex items-center gap-2 px-3 py-2 text-xs font-semibold text-primary-content rounded bg-primary border border-base-content/5 hover:bg-primary-hover transition-colors"
        >確認モーダルを開く</button>
        <button
          onclick="openModal('delete')"
          class="inline-flex items-center gap-2 px-3 py-2 text-xs font-semibold text-primary-content rounded bg-primary border border-base-content/5 hover:bg-primary-hover transition-colors"
        >削除確認モーダルを開く</button>
      </div>
    </div>

    <!-- Static Dialog (no scrim) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Dialog (Static)</p>
      <div class="bg-gray-100 p-8 rounded-lg flex justify-center">
        <div class="w-96 rounded-xl bg-white shadow-[0_16px_16px_rgba(0,0,0,0.18)] flex flex-col">
          <div class="flex flex-col gap-2 pt-6 px-6">
            <p class="text-lg font-semibold leading-7 text-base-content">ダイアログタイトル</p>
          </div>
          <div class="flex flex-col gap-2 px-6 py-4">
            <p class="text-sm leading-5 text-base-content/60">この操作を実行してよろしいですか？この操作は取り消せません</p>
          </div>
          <div class="flex items-center justify-end gap-3 px-6 py-4">
            <button class="inline-flex items-center justify-center gap-2 px-3 py-2 text-xs font-semibold text-base-content rounded bg-base-200 border border-base-content/5 hover:bg-base-300 transition-colors">キャンセル</button>
            <button class="inline-flex items-center justify-center gap-2 px-3 py-2 text-xs font-semibold text-primary-content rounded bg-primary border border-base-content/5 hover:bg-primary-hover transition-colors">承認</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer Variants -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Footer Variants</p>
      <div class="space-y-4">

        <!-- With count -->
        <div class="w-96 rounded-xl bg-white border border-gray-200">
          <div class="flex items-center justify-end gap-3 px-6 py-4">
            <p class="flex-1 text-sm leading-5 text-base-content/60">0件選択中</p>
            <button class="inline-flex items-center justify-center gap-2 px-3 py-2 text-xs font-semibold text-base-content rounded bg-base-200 border border-base-content/5 hover:bg-base-300 transition-colors">キャンセル</button>
            <button class="inline-flex items-center justify-center gap-2 px-3 py-2 text-xs font-semibold text-primary-content rounded bg-primary border border-base-content/5 hover:bg-primary-hover transition-colors">承認</button>
          </div>
        </div>
        <p class="text-[10px] text-gray-400 ml-2">With count (showCount=true)</p>

        <!-- Without count -->
        <div class="w-96 rounded-xl bg-white border border-gray-200">
          <div class="flex items-center justify-end gap-3 px-6 py-4">
            <button class="inline-flex items-center justify-center gap-2 px-3 py-2 text-xs font-semibold text-base-content rounded bg-base-200 border border-base-content/5 hover:bg-base-300 transition-colors">キャンセル</button>
            <button class="inline-flex items-center justify-center gap-2 px-3 py-2 text-xs font-semibold text-primary-content rounded bg-primary border border-base-content/5 hover:bg-primary-hover transition-colors">承認</button>
          </div>
        </div>
        <p class="text-[10px] text-gray-400 ml-2">Without count (showCount=false)</p>

        <!-- Danger action -->
        <div class="w-96 rounded-xl bg-white border border-gray-200">
          <div class="flex items-center justify-end gap-3 px-6 py-4">
            <button class="inline-flex items-center justify-center gap-2 px-3 py-2 text-xs font-semibold text-base-content rounded bg-base-200 border border-base-content/5 hover:bg-base-300 transition-colors">キャンセル</button>
            <button class="inline-flex items-center justify-center gap-2 px-3 py-2 text-xs font-semibold text-error-content rounded bg-error border border-base-content/5 hover:bg-error-hover transition-colors">削除</button>
          </div>
        </div>
        <p class="text-[10px] text-gray-400 ml-2">Danger action</p>

      </div>
    </div>

  </div>

  <!-- Modal Container -->
  <div id="modal-container" data-demo-keep class="hidden fixed inset-0 z-50 flex items-center justify-center" onclick="onContainerClick(event)">
    <div id="modal-backdrop" class="absolute inset-0 bg-black/50 opacity-0 transition-opacity duration-200"></div>
    <div id="modal-panel" class="relative w-96 rounded-xl bg-white shadow-[0_16px_16px_rgba(0,0,0,0.18)] flex flex-col opacity-0 scale-95 transition-all duration-200">
      <div class="flex flex-col gap-2 pt-6 px-6">
        <p id="modal-title" class="text-lg font-semibold leading-7 text-base-content"></p>
      </div>
      <div class="flex flex-col gap-2 px-6 py-4">
        <p id="modal-body" class="text-sm leading-5 text-base-content/60"></p>
      </div>
      <div class="flex items-center justify-end gap-3 px-6 py-4">
        <button onclick="closeModal()" class="inline-flex items-center justify-center gap-2 px-3 py-2 text-xs font-semibold text-base-content rounded bg-base-200 border border-base-content/5 hover:bg-base-300 transition-colors">キャンセル</button>
        <button id="modal-confirm" onclick="closeModal()" class="inline-flex items-center justify-center gap-2 px-3 py-2 text-xs font-semibold rounded border border-base-content/5 transition-colors"></button>
      </div>
    </div>
  </div>

  <script>
    const MODAL_PRESETS = {
      confirm: {
        title: 'ダイアログタイトル',
        body: 'この操作を実行してよろしいですか？この操作は取り消せません',
        confirmLabel: '承認',
        confirmClass: 'text-primary-content bg-primary hover:bg-primary-hover'
      },
      delete: {
        title: '本当に削除しますか？',
        body: 'この操作は取り消せません。関連するデータも削除されます',
        confirmLabel: '削除',
        confirmClass: 'text-error-content bg-error hover:bg-error-hover'
      }
    };

    function openModal(type) {
      const cfg = MODAL_PRESETS[type];
      document.getElementById('modal-title').textContent = cfg.title;
      document.getElementById('modal-body').textContent = cfg.body;
      const confirmBtn = document.getElementById('modal-confirm');
      confirmBtn.textContent = cfg.confirmLabel;
      confirmBtn.className = 'inline-flex items-center justify-center gap-2 px-3 py-2 text-xs font-semibold rounded border border-base-content/5 transition-colors ' + cfg.confirmClass;

      const container = document.getElementById('modal-container');
      container.classList.remove('hidden');
      requestAnimationFrame(() => {
        document.getElementById('modal-backdrop').classList.replace('opacity-0', 'opacity-100');
        const panel = document.getElementById('modal-panel');
        panel.classList.replace('opacity-0', 'opacity-100');
        panel.classList.replace('scale-95', 'scale-100');
      });
    }

    function closeModal() {
      document.getElementById('modal-backdrop').classList.replace('opacity-100', 'opacity-0');
      const panel = document.getElementById('modal-panel');
      panel.classList.replace('opacity-100', 'opacity-0');
      panel.classList.replace('scale-100', 'scale-95');
      setTimeout(() => document.getElementById('modal-container').classList.add('hidden'), 200);
    }

    function onContainerClick(event) {
      if (event.target.id === 'modal-backdrop' || event.target.id === 'modal-container') {
        closeModal();
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !document.getElementById('modal-container').classList.contains('hidden')) {
        closeModal();
      }
    });
  </script>

</body>
</html>
