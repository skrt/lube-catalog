<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'primary': {
          DEFAULT: '#0a0ac2',
          hover: '#080892',
          content: '#f3f4fe',
        },
        'secondary': {
          DEFAULT: '#e8e8fd',
          hover: '#e0e0f5',
          content: '#0a0ac2',
        },
        'base-content': 'rgb(16 16 22 / <alpha-value>)',
        'base-200': '#f8f8fa',
        'base-300': '#eeeef2',
        'error': {
          DEFAULT: '#c94043',
          hover: '#b7393c',
          content: '#fff5f5',
          'bg': '#f7e2e3',
        },
        'success': {
          DEFAULT: '#479d72',
          content: '#f5fef9',
          'bg': '#e3f0ea',
        },
        'warning': {
          DEFAULT: '#de781f',
          content: '#fffcf8',
          'bg': '#faebdd',
        },
        'info': {
          DEFAULT: '#535671',
          content: '#f2f4ff',
          'bg': '#e5e6ea',
        },
      },
      borderRadius: {
        'sm': '4px',
      },
      boxShadow: {
        'border-base-content-5': 'inset 0 0 0 1px rgba(16, 16, 22, 0.05)',
        'border-base-content-10': 'inset 0 0 0 1px rgba(16, 16, 22, 0.1)',
        'border-base-content-20': 'inset 0 0 0 1px rgba(16, 16, 22, 0.2)',
        'border-2-base-content-10': 'inset 0 0 0 2px rgba(16, 16, 22, 0.1)',
        'border-2-base-content-20': 'inset 0 0 0 2px rgba(16, 16, 22, 0.2)',
        'border-primary': 'inset 0 0 0 1px #0a0ac2',
        'border-2-primary': 'inset 0 0 0 2px #0a0ac2',
        'border-error': 'inset 0 0 0 1px #c94043',
        'border-2-error': 'inset 0 0 0 2px #c94043',
      },
    },
  },
};
</script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>[x-cloak] { display: none !important; } #back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; min-height: 200px !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    Checkbox: 真偽値選択
      Size: lg (24px, text-base), md (20px, text-sm), sm (16px, text-xs)
      State: Default / Hover / Disabled
      Checked: Unchecked / Checked / Indeterminate
      Layout: flex, gap-2 (8px), items-center
      Box radius: rounded-sm (4px)
      Unchecked Default:  bg-white, border 1px base-content/20
      Unchecked Hover:    bg-white, border 2px primary (#0a0ac2)
      Unchecked Disabled: bg-base-200 (#f8f8fa), border 1px base-content/10
      Checked Default/Hover:    bg-primary (#0a0ac2), white check icon
      Checked Disabled:         bg-base-content/10, lighter check
      Indeterminate Default/Hover: bg-primary, white minus icon
      Indeterminate Disabled:      bg-base-content/10, lighter minus
      Label Default/Hover: text-base-content (#101016)
      Label Disabled:      text-base-content/30
  -->

  <div class="space-y-10">

    <!-- Demo -->
    <div id="demo-section" x-data="{
      items: [
        { label: '見積依頼', checked: true },
        { label: '見積書', checked: false },
        { label: '発注請書', checked: true },
        { label: '発注書', checked: false },
        { label: '請求書', checked: false }
      ],
      get allState() {
        const c = this.items.filter(i => i.checked).length;
        return c === 0 ? 'unchecked' : c === this.items.length ? 'checked' : 'indeterminate';
      },
      toggleAll() {
        const next = this.allState !== 'checked';
        this.items.forEach(i => i.checked = next);
      }
    }">
      <p class="text-sm text-gray-500 mb-4">クリックで切り替え。全選択で Indeterminate → Checked に変化</p>
      <div class="flex flex-col gap-2">
        <!-- Select All (indeterminate capable) -->
        <div class="flex gap-2 items-center cursor-pointer group" @click="toggleAll()">
          <div class="relative shrink-0 size-5 rounded"
            :class="allState === 'unchecked' ? 'bg-white shadow-border-base-content-20 group-hover:shadow-border-2-primary' : 'bg-primary'">
            <svg x-show="allState === 'checked'" class="absolute inset-0 w-full h-full text-white p-0.5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
            <svg x-show="allState === 'indeterminate'" x-cloak class="absolute inset-0 w-full h-full text-white p-1" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
          </div>
          <span class="text-sm leading-5 text-base-content font-semibold">すべて選択</span>
        </div>
        <div class="border-t border-base-content/10 my-1"></div>
        <!-- Items -->
        <template x-for="(item, i) in items" :key="i">
          <div class="flex gap-2 items-center cursor-pointer group" @click="item.checked = !item.checked">
            <div class="relative shrink-0 size-5 rounded"
              :class="item.checked ? 'bg-primary' : 'bg-white shadow-border-base-content-20 group-hover:shadow-border-2-primary'">
              <svg x-show="item.checked" class="absolute inset-0 w-full h-full text-white p-0.5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
            </div>
            <span class="text-sm leading-5 text-base-content" x-text="item.label"></span>
          </div>
        </template>
      </div>
    </div>

    <!-- Checked States (md) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Checked States (md)</p>
      <div class="flex flex-wrap items-center gap-6">
        <!-- Unchecked -->
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded bg-white shadow-border-base-content-20"></div>
          <span class="text-sm leading-5 text-base-content">Unchecked</span>
        </div>
        <!-- Checked -->
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded bg-primary">
            <svg class="absolute inset-0 w-full h-full text-white p-0.5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <span class="text-sm leading-5 text-base-content">Checked</span>
        </div>
        <!-- Indeterminate -->
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded bg-primary">
            <svg class="absolute inset-0 w-full h-full text-white p-1" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
          </div>
          <span class="text-sm leading-5 text-base-content">Indeterminate</span>
        </div>
      </div>
    </div>

    <!-- States (md, Checked) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>States (md, Checked)</p>
      <div class="flex flex-wrap items-center gap-6">
        <!-- Default -->
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded bg-primary">
            <svg class="absolute inset-0 w-full h-full text-white p-0.5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <span class="text-sm leading-5 text-base-content">Default</span>
        </div>
        <!-- Hover -->
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded bg-primary">
            <svg class="absolute inset-0 w-full h-full text-white p-0.5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <span class="text-sm leading-5 text-base-content">Hover</span>
        </div>
        <!-- Disabled -->
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded bg-base-content/10">
            <svg class="absolute inset-0 w-full h-full text-white p-0.5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <span class="text-sm leading-5 text-base-content/30">Disabled</span>
        </div>
      </div>
    </div>

    <!-- States (md, Unchecked) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>States (md, Unchecked)</p>
      <div class="flex flex-wrap items-center gap-6">
        <!-- Default -->
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded bg-white shadow-border-base-content-20"></div>
          <span class="text-sm leading-5 text-base-content">Default</span>
        </div>
        <!-- Hover -->
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded bg-white shadow-border-2-primary"></div>
          <span class="text-sm leading-5 text-base-content">Hover</span>
        </div>
        <!-- Disabled -->
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded bg-base-200 shadow-border-base-content-10"></div>
          <span class="text-sm leading-5 text-base-content/30">Disabled</span>
        </div>
      </div>
    </div>

    <!-- Sizes (Checked) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Sizes</p>
      <div class="flex flex-wrap items-center gap-6">
        <!-- sm -->
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-4 rounded bg-primary">
            <svg class="absolute inset-0 w-full h-full text-white p-0.5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <span class="text-xs leading-4 text-base-content">sm</span>
        </div>
        <!-- md -->
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded bg-primary">
            <svg class="absolute inset-0 w-full h-full text-white p-0.5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <span class="text-sm leading-5 text-base-content">md</span>
        </div>
        <!-- lg -->
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-6 rounded bg-primary">
            <svg class="absolute inset-0 w-full h-full text-white p-0.5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <span class="text-base leading-6 text-base-content">lg</span>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
