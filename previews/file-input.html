<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../tailwind.config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>[x-cloak] { display: none !important; } #back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 24px 24px !important; min-height: 200px !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    DataInput: ファイル添付フォーム
      State: Empty, Loading, Selected
      Container: w-[480px], flex-col, gap-1 (4px)
      Legend: text-xs semibold, text-base-content, required * text-error
      Button: bg-base-200, border base-content/5, rounded-sm (4px), px-3 py-2
        Icon: paperclip (sm/14px), text-base-content
        Label: text-xs semibold, text-base-content
      Loading Button: bg-base-300, no border
        Icon: loader-circle (sm/14px), text-base-content/30
        Label: text-xs semibold, text-base-content/30, "処理中..."
      Helper: text-xs, text-base-content/60
      FileRow: flex, gap-2, items-center
        FileName: text-xs, text-base-content, truncate
        FileSize: text-xs, text-base-content/30, "(size)"
        DeleteButton: IconButton sm, trash-2 icon
  -->

  <div class="space-y-10">

    <!-- Demo -->
    <div id="demo-section" x-data="{ files: [], loading: false }">
      <p class="text-sm text-gray-500 mb-4">「データを選択」でファイルを追加（ダミー）。ゴミ箱で削除</p>
      <div class="flex flex-col gap-1 w-[480px]">
        <div class="flex gap-1 items-start">
          <span class="text-xs font-semibold leading-4 text-base-content">データ添付</span>
          <span class="text-xs font-semibold leading-4 text-error">*</span>
        </div>
        <!-- File list -->
        <template x-if="files.length > 0">
          <div class="flex flex-col gap-2">
            <template x-for="(file, i) in files" :key="i">
              <div class="flex gap-2 items-center">
                <div class="flex gap-1 items-center">
                  <span class="text-xs leading-4 text-base-content truncate" x-text="file.name"></span>
                  <span class="text-xs leading-4 text-base-content/30" x-text="'(' + file.size + ')'"></span>
                </div>
                <button class="shrink-0 bg-base-200 border border-base-content/5 rounded p-1.5 hover:bg-base-300" @click="files.splice(i, 1)">
                  <svg class="w-3 h-3 text-base-content" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                </button>
              </div>
            </template>
          </div>
        </template>
        <!-- Button -->
        <button
          class="flex gap-2 items-center justify-center px-3 py-2 rounded-sm text-xs font-semibold leading-4 self-start"
          :class="loading ? 'bg-base-300 text-base-content/30' : 'bg-base-200 border border-base-content/5 text-base-content hover:bg-base-300'"
          :disabled="loading"
          @click="loading = true; setTimeout(() => { files.push({name: '添付ファイル_' + (files.length + 1) + '.pdf', size: Math.floor(Math.random() * 9000 + 100) + 'KB'}); loading = false; }, 1000)">
          <template x-if="!loading">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </template>
          <template x-if="loading">
            <svg class="w-3.5 h-3.5 animate-spin" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </template>
          <span x-text="loading ? '処理中...' : 'データを選択'"></span>
        </button>
        <p class="text-xs leading-4 text-base-content/60">容量の上限：10MB</p>
      </div>
    </div>

    <!-- States (md) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>States</p>
      <div class="flex flex-wrap items-start gap-10">
        <!-- Empty -->
        <div class="flex flex-col gap-1.5">
          <span class="text-xs text-base-content/60 mb-1">Empty</span>
          <div class="flex flex-col gap-1 w-[480px]">
            <div class="flex gap-1 items-start">
              <span class="text-xs font-semibold leading-4 text-base-content">データ添付</span>
              <span class="text-xs font-semibold leading-4 text-error">*</span>
            </div>
            <button class="flex gap-2 items-center justify-center px-3 py-2 rounded bg-base-200 border border-base-content/5 self-start">
              <svg class="w-3.5 h-3.5 text-base-content" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              <span class="text-xs font-semibold leading-4 text-base-content">データを選択</span>
            </button>
            <p class="text-xs leading-4 text-base-content/60">容量の上限：10MB</p>
          </div>
        </div>
        <!-- Loading -->
        <div class="flex flex-col gap-1.5">
          <span class="text-xs text-base-content/60 mb-1">Loading</span>
          <div class="flex flex-col gap-1 w-[480px]">
            <div class="flex gap-1 items-start">
              <span class="text-xs font-semibold leading-4 text-base-content">データ添付</span>
              <span class="text-xs font-semibold leading-4 text-error">*</span>
            </div>
            <button class="flex gap-2 items-center justify-center px-3 py-2 rounded bg-base-300 self-start" disabled>
              <svg class="w-3.5 h-3.5 text-base-content/30 animate-spin" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
              <span class="text-xs font-semibold leading-4 text-base-content/30">処理中...</span>
            </button>
            <p class="text-xs leading-4 text-base-content/60">容量の上限：10MB</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Selected -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Selected</p>
      <div class="flex flex-col gap-1 w-[480px]">
        <div class="flex gap-1 items-start">
          <span class="text-xs font-semibold leading-4 text-base-content">データ添付</span>
          <span class="text-xs font-semibold leading-4 text-error">*</span>
        </div>
        <div class="flex flex-col gap-2">
          <div class="flex gap-2 items-center">
            <div class="flex gap-1 items-center">
              <span class="text-xs leading-4 text-base-content">見積書_サンプル.pdf</span>
              <span class="text-xs leading-4 text-base-content/30">(2,345KB)</span>
            </div>
            <button class="shrink-0 bg-base-200 border border-base-content/5 rounded p-1.5">
              <svg class="w-3 h-3 text-base-content" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            </button>
          </div>
          <div class="flex gap-2 items-center">
            <div class="flex gap-1 items-center">
              <span class="text-xs leading-4 text-base-content">請求書_2024年5月分.pdf</span>
              <span class="text-xs leading-4 text-base-content/30">(1,024KB)</span>
            </div>
            <button class="shrink-0 bg-base-200 border border-base-content/5 rounded p-1.5">
              <svg class="w-3 h-3 text-base-content" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            </button>
          </div>
          <div class="flex gap-2 items-center">
            <div class="flex gap-1 items-center">
              <span class="text-xs leading-4 text-base-content">発注書スキャン画像_20240613_150058_控え_最終版.png</span>
              <span class="text-xs leading-4 text-base-content/30">(45KB)</span>
            </div>
            <button class="shrink-0 bg-base-200 border border-base-content/5 rounded p-1.5">
              <svg class="w-3 h-3 text-base-content" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            </button>
          </div>
          <button class="flex gap-2 items-center justify-center px-3 py-2 rounded bg-base-200 border border-base-content/5 self-start">
            <svg class="w-3.5 h-3.5 text-base-content" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            <span class="text-xs font-semibold leading-4 text-base-content">データを選択</span>
          </button>
        </div>
        <p class="text-xs leading-4 text-base-content/60">容量の上限：10MB</p>
      </div>
    </div>

  </div>

</body>
</html>
