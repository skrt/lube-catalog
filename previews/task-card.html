<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
@theme {
  --text-2xs: 11px;
  --text-2xs--line-height: 16px;
  --color-primary: #0a0ac2;
  --color-primary-hover: #080892;
  --color-primary-content: #f3f4fe;
  --color-secondary: #e8e8fd;
  --color-secondary-hover: #e0e0f5;
  --color-secondary-content: #0a0ac2;
  --color-base-content: #101016;
  --color-base-200: #f8f8fa;
  --color-base-300: #eeeef2;
  --color-danger: #c94043;
  --color-danger-hover: #b7393c;
  --color-danger-content: #fff5f5;
  --color-danger-soft: #fff5f5;
  --color-success: #479d72;
  --color-success-content: #f5fef9;
  --color-success-soft: #f5fef9;
  --color-warning: #de781f;
  --color-warning-content: #fffcf8;
  --color-warning-soft: #fffcf8;
  --color-info: #535671;
  --color-info-content: #f2f4ff;
  --color-info-soft: #f2f4ff;
  --radius-sm: 4px;
  --shadow-border-base-content-5: inset 0 0 0 1px rgba(16, 16, 22, 0.05);
  --shadow-border-base-content-10: inset 0 0 0 1px rgba(16, 16, 22, 0.1);

  --shadow-border-2-base-content-20: inset 0 0 0 2px rgba(16, 16, 22, 0.2);
  --shadow-border-primary: inset 0 0 0 1px #0a0ac2;
  --shadow-border-2-primary: inset 0 0 0 2px #0a0ac2;

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: white !important; box-shadow: inset 0 0 0 0.5px rgba(16,16,22,0.1) !important; border-radius: 8px !important; padding: 36px 32px 32px !important; min-height: 200px !important; box-sizing: border-box; }
.in-iframe.demo-only, .in-iframe.demo-only body { scrollbar-width: none; }
.in-iframe.demo-only::-webkit-scrollbar, .in-iframe.demo-only body::-webkit-scrollbar { display: none; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma TaskCard SET 4470:102431):
    TaskCard: タスクリスト左レールのタスクカード（クリックで選択・排他）
      State: Default / Hover / Selected
      Container: bg-white rounded-md (6px), 幅292px固定（レール内では w-full FILL）
        Default: 枠1px base-content/5 (shadow-border-base-content-5)
        Hover:   bg-base-200 + 枠1px base-content/5
        Selected: bg-white + 枠2px primary (shadow-border-2-primary)
      主対象: px-4 pt-3 pb-2, flex-col gap-1
        商品名: text-sm font-semibold text-base-content（折り返しあり）
        会社名: text-sm text-base-content
      Divider: px-4 インセット, h-px bg-base-content/5
      種別・日付: px-4 py-2, justify-between
        種別: text-xs text-base-content/60
        日付: text-2xs (11px) text-base-content/30
      カード間の gap: 8px (gap-2)
  -->

  <div class="space-y-10">

    <!-- States -->
    <div>
      <p class="text-xs font-normal text-gray-400 tracking-wider mb-4">States</p>
      <div class="flex items-start gap-8">
        <div>
          <p class="text-[10px] text-gray-400 mb-2">Default</p>
          <div class="bg-white rounded-md shadow-border-base-content-5 flex flex-col w-73">
            <div class="flex flex-col gap-1 px-4 pt-3 pb-2 text-sm text-base-content">
              <p class="font-semibold break-words">安眠枕用頚椎計測器【新デザイン】</p>
              <p>株式会社コトハ商事</p>
            </div>
            <div class="px-4"><div class="h-px bg-base-content/5"></div></div>
            <div class="flex items-center justify-between px-4 py-2">
              <span class="text-xs text-base-content/60">商品マスタの編集</span>
              <span class="text-2xs text-base-content/30">2026.06.20</span>
            </div>
          </div>
        </div>
        <div>
          <p class="text-[10px] text-gray-400 mb-2">Hover</p>
          <div class="bg-base-200 rounded-md shadow-border-base-content-5 flex flex-col w-73">
            <div class="flex flex-col gap-1 px-4 pt-3 pb-2 text-sm text-base-content">
              <p class="font-semibold break-words">安眠枕用頚椎計測器【新デザイン】</p>
              <p>株式会社コトハ商事</p>
            </div>
            <div class="px-4"><div class="h-px bg-base-content/5"></div></div>
            <div class="flex items-center justify-between px-4 py-2">
              <span class="text-xs text-base-content/60">商品マスタの編集</span>
              <span class="text-2xs text-base-content/30">2026.06.20</span>
            </div>
          </div>
        </div>
        <div>
          <p class="text-[10px] text-gray-400 mb-2">Selected</p>
          <div class="bg-white rounded-md shadow-border-2-primary flex flex-col w-73">
            <div class="flex flex-col gap-1 px-4 pt-3 pb-2 text-sm text-base-content">
              <p class="font-semibold break-words">安眠枕用頚椎計測器【新デザイン】</p>
              <p>株式会社コトハ商事</p>
            </div>
            <div class="px-4"><div class="h-px bg-base-content/5"></div></div>
            <div class="flex items-center justify-between px-4 py-2">
              <span class="text-xs text-base-content/60">商品マスタの編集</span>
              <span class="text-2xs text-base-content/30">2026.06.20</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Demo -->
    <div id="demo-section" x-data="{ selected: 0, cards: [
      { title: '安眠枕用頚椎計測器【新デザイン】', company: '株式会社コトハ商事', type: '商品マスタの編集', date: '2026.06.20' },
      { title: 'オーガニックコットン巾着（Sサイズ）', company: 'ツムギパック株式会社', type: '商品マスタの編集', date: '2026.06.18' },
      { title: '強化ダンボール 60サイズ', company: '株式会社コトハ商事', type: '商品マスタの編集', date: '2026.06.15' }
    ] }">
      <p class="text-sm text-gray-500 mb-4">クリックで選択切り替え（排他選択）</p>
      <div class="flex flex-col gap-2 w-73">
        <template x-for="(card, i) in cards" :key="i">
          <div class="rounded-md flex flex-col cursor-pointer outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
               :class="selected === i ? 'bg-white shadow-border-2-primary' : 'bg-white shadow-border-base-content-5 hover:bg-base-200'"
               tabindex="0" @click="selected = i" @keydown.enter.prevent="selected = i">
            <div class="flex flex-col gap-1 px-4 pt-3 pb-2 text-sm text-base-content">
              <p class="font-semibold break-words" x-text="card.title"></p>
              <p x-text="card.company"></p>
            </div>
            <div class="px-4"><div class="h-px bg-base-content/5"></div></div>
            <div class="flex items-center justify-between px-4 py-2">
              <span class="text-xs text-base-content/60" x-text="card.type"></span>
              <span class="text-2xs text-base-content/30" x-text="card.date"></span>
            </div>
          </div>
        </template>
      </div>
    </div>

  </div>

</body>
</html>
