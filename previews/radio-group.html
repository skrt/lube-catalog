<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'primary': {
          DEFAULT: '#0a0ac2',
          hover: '#080892',
          content: '#f3f4fe',
        },
        'secondary': {
          DEFAULT: '#e8e8fd',
          hover: '#e0e0f5',
          content: '#0a0ac2',
        },
        'base-content': 'rgb(16 16 22 / <alpha-value>)',
        'base-200': '#f8f8fa',
        'base-300': '#eeeef2',
        'error': {
          DEFAULT: '#c94043',
          hover: '#b7393c',
          content: '#fff5f5',
          'bg': '#f7e2e3',
        },
        'success': {
          DEFAULT: '#479d72',
          content: '#f5fef9',
          'bg': '#e3f0ea',
        },
        'warning': {
          DEFAULT: '#de781f',
          content: '#fffcf8',
          'bg': '#faebdd',
        },
        'info': {
          DEFAULT: '#535671',
          content: '#f2f4ff',
          'bg': '#e5e6ea',
        },
      },
      borderRadius: {
        'sm': '4px',
      },
      boxShadow: {
        'border-base-content-5': 'inset 0 0 0 1px rgba(16, 16, 22, 0.05)',
        'border-base-content-10': 'inset 0 0 0 1px rgba(16, 16, 22, 0.1)',
        'border-base-content-20': 'inset 0 0 0 1px rgba(16, 16, 22, 0.2)',
        'border-2-base-content-10': 'inset 0 0 0 2px rgba(16, 16, 22, 0.1)',
        'border-2-base-content-20': 'inset 0 0 0 2px rgba(16, 16, 22, 0.2)',
        'border-primary': 'inset 0 0 0 1px #0a0ac2',
        'border-2-primary': 'inset 0 0 0 2px #0a0ac2',
        'border-error': 'inset 0 0 0 1px #c94043',
        'border-2-error': 'inset 0 0 0 2px #c94043',
      },
    },
  },
};
</script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>[x-cloak] { display: none !important; } #back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; min-height: 200px !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    RadioGroup / Radio / Item:
      Size: lg (24px, text-base), md (20px, text-sm), sm (16px, text-xs)
      State: Default, Selected, Disabled, Selected-Disabled
      Default: white circle, border 1px base-content/20, rounded-full
      Hover: white circle, border 2px primary, rounded-full
      Selected: white circle, border 1px primary, inner dot bg-primary
      Disabled: bg-base-200, border 1px base-content/10
      Selected-Disabled: border 2px base-content/10, dot base-content/10
      Label Default/Selected: text-base-content
      Label Disabled: text-base-content/30

    RadioGroup / Button / Item:
      State: Active, Inactive, Hover
      Active: bg-primary, text-primary-content, rounded-md (6px), h-8
      Inactive: bg-white, border base-content/10, text-base-content
      Hover: bg-secondary, text-base-content
      Count badge (optional):
        Active: bg-white, text-primary
        Inactive: bg-base-200, text-base-content/60
      Font: text-sm semibold
  -->

  <div class="space-y-10">

    <!-- Demo: Radio -->
    <div id="demo-section" x-data="{ radioSelected: 'opt1', buttonSelected: 'all' }">
      <p class="text-sm text-gray-500 mb-4">クリック or Enter で選択。Tab でフォーカス移動</p>
      <div class="flex flex-col gap-2 mb-8">
        <template x-for="item in [{id:'opt1',label:'オプション 1'},{id:'opt2',label:'オプション 2'},{id:'opt3',label:'オプション 3'},{id:'opt4',label:'オプション 4'}]" :key="item.id">
          <div class="group flex gap-2 items-center cursor-pointer" @click="radioSelected = item.id">
            <div class="relative shrink-0 size-5 rounded-full outline-none focus:ring-2 focus:ring-primary/30" tabindex="0" @keydown.enter.prevent="radioSelected = item.id"
              :class="radioSelected === item.id ? 'bg-white shadow-border-primary' : 'bg-white shadow-border-base-content-20 group-hover:shadow-border-2-primary'">
              <div x-show="radioSelected === item.id" class="absolute inset-[5px] rounded-full bg-primary"></div>
            </div>
            <span class="text-sm leading-5 text-base-content" x-text="item.label"></span>
          </div>
        </template>
      </div>

      <p class="text-sm text-gray-500 mb-4">クリックで選択切り替え</p>
      <div class="flex gap-2 items-center">
        <template x-for="item in [{id:'all',label:'すべて'},{id:'unsent',label:'未送付',count:'12'},{id:'sent',label:'送付済み',count:'48'}]" :key="item.id">
          <div class="flex h-8 items-center justify-center px-2 rounded-md cursor-pointer"
            :class="[
              buttonSelected === item.id ? 'bg-primary' : 'bg-white shadow-border-base-content-10 hover:bg-secondary hover:shadow-none',
              item.count ? 'gap-1 py-1' : 'py-1.5'
            ]"
            @click="buttonSelected = item.id">
            <span class="text-sm font-semibold leading-5" :class="buttonSelected === item.id ? 'text-primary-content' : 'text-base-content'" x-text="item.label"></span>
            <template x-if="item.count">
              <div class="flex items-center justify-center px-2 py-0.5 rounded-full"
                :class="buttonSelected === item.id ? 'bg-white' : 'bg-base-200'">
                <span class="text-sm leading-5" :class="buttonSelected === item.id ? 'text-primary' : 'text-base-content/60'" x-text="item.count"></span>
              </div>
            </template>
          </div>
        </template>
      </div>
    </div>

    <!-- demo-skip: bg-base-content/10 -->
    <!-- Radio: States (md) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Radio States (md)</p>
      <div class="flex flex-wrap items-center gap-6">
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded-full bg-white shadow-border-base-content-20"></div>
          <span class="text-sm leading-5 text-base-content">Default</span>
        </div>
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded-full bg-white shadow-border-2-primary"></div>
          <span class="text-sm leading-5 text-base-content">Hover</span>
        </div>
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded-full bg-white shadow-border-primary">
            <div class="absolute inset-[5px] rounded-full bg-primary"></div>
          </div>
          <span class="text-sm leading-5 text-base-content">Selected</span>
        </div>
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded-full bg-base-200 shadow-border-base-content-10"></div>
          <span class="text-sm leading-5 text-base-content/30">Disabled</span>
        </div>
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded-full bg-white shadow-border-base-content-10">
            <div class="absolute inset-[5px] rounded-full bg-base-content/10"></div>
          </div>
          <span class="text-sm leading-5 text-base-content/30">Selected-Disabled</span>
        </div>
      </div>
    </div>

    <!-- Radio: Sizes -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Radio Sizes (Selected)</p>
      <div class="flex flex-wrap items-center gap-6">
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-4 rounded-full bg-white shadow-border-primary">
            <div class="absolute inset-[4px] rounded-full bg-primary"></div>
          </div>
          <span class="text-xs leading-4 text-base-content">sm</span>
        </div>
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-5 rounded-full bg-white shadow-border-primary">
            <div class="absolute inset-[5px] rounded-full bg-primary"></div>
          </div>
          <span class="text-sm leading-5 text-base-content">md</span>
        </div>
        <div class="flex gap-2 items-center">
          <div class="relative shrink-0 size-6 rounded-full bg-white shadow-border-primary">
            <div class="absolute inset-[6px] rounded-full bg-primary"></div>
          </div>
          <span class="text-base leading-6 text-base-content">lg</span>
        </div>
      </div>
    </div>

    <!-- Button: States -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>States</p>
      <div class="flex flex-wrap items-center gap-4">
        <div class="flex h-8 items-center justify-center gap-1 px-2 py-1 rounded-md bg-primary">
          <span class="text-sm font-semibold leading-5 text-primary-content">Active</span>
          <div class="flex items-center justify-center px-2 py-0.5 rounded-full bg-white">
            <span class="text-sm leading-5 text-primary">100</span>
          </div>
        </div>
        <div class="flex h-8 items-center justify-center gap-1 px-2 py-1 rounded-md bg-white shadow-border-base-content-10">
          <span class="text-sm font-semibold leading-5 text-base-content">Inactive</span>
          <div class="flex items-center justify-center px-2 py-0.5 rounded-full bg-base-200">
            <span class="text-sm leading-5 text-base-content/60">100</span>
          </div>
        </div>
        <div class="flex h-8 items-center justify-center gap-1 px-2 py-1 rounded-md bg-secondary">
          <span class="text-sm font-semibold leading-5 text-base-content">Hover</span>
          <div class="flex items-center justify-center px-2 py-0.5 rounded-full bg-base-200">
            <span class="text-sm leading-5 text-base-content/60">100</span>
          </div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
