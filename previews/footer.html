<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
@theme {
  --color-primary: #0a0ac2;
  --color-primary-hover: #080892;
  --color-primary-content: #f3f4fe;
  --color-secondary: #e8e8fd;
  --color-secondary-hover: #e0e0f5;
  --color-secondary-content: #0a0ac2;
  --color-base-content: #101016;
  --color-base-200: #f8f8fa;
  --color-base-300: #eeeef2;
  --color-danger: #c94043;
  --color-danger-hover: #b7393c;
  --color-danger-content: #fff5f5;
  --color-danger-soft: #fff5f5;
  --color-success: #479d72;
  --color-success-content: #f5fef9;
  --color-success-soft: #f5fef9;
  --color-warning: #de781f;
  --color-warning-content: #fffcf8;
  --color-warning-soft: #fffcf8;
  --color-info: #535671;
  --color-info-content: #f2f4ff;
  --color-info-soft: #f2f4ff;
  --radius-sm: 4px;
  --shadow-border-base-content-5: inset 0 0 0 1px rgba(16, 16, 22, 0.05);
  --shadow-border-base-content-10: inset 0 0 0 1px rgba(16, 16, 22, 0.1);
  --shadow-border-base-content-20: inset 0 0 0 1px rgba(16, 16, 22, 0.2);
  --shadow-border-2-base-content-10: inset 0 0 0 2px rgba(16, 16, 22, 0.1);
  --shadow-border-2-base-content-20: inset 0 0 0 2px rgba(16, 16, 22, 0.2);
  --shadow-border-primary: inset 0 0 0 1px #0a0ac2;
  --shadow-border-2-primary: inset 0 0 0 2px #0a0ac2;
  --shadow-border-danger: inset 0 0 0 1px #c94043;
  --shadow-border-2-danger: inset 0 0 0 2px #c94043;
}
</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: white !important; box-shadow: inset 0 0 0 0.5px rgba(16,16,22,0.1) !important; border-radius: 8px !important; padding: 36px 32px 32px !important; min-height: 200px !important; box-sizing: border-box; }
.in-iframe.demo-only, .in-iframe.demo-only body { scrollbar-width: none; }
.in-iframe.demo-only::-webkit-scrollbar, .in-iframe.demo-only body::-webkit-scrollbar { display: none; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    Footer: 画面下部固定のアクションバー。コンテンツの上に重なる
      Container: bg-base-100 (white), border-t base-content/10, px-6 (24px) py-3 (12px)=高さ64（ボタンh-10=40+上下12）, sticky bottom
      Back Button (optional): Tertiary lg (bg-base-200, border base-content/5, rounded-md, px-4 py-2.5, text-sm font-semibold)
        icon: chevron-left 14px
      Spacer: flex-1
      CTA group: gap-2 (8px), right-aligned
        Sub CTA: Tertiary lg (px-4 py-2.5, text-sm font-semibold), w-48, icon left (save 14px)
        Main CTA: Primary lg (px-4 py-2.5, text-sm font-semibold), w-48, icon left (send 14px)
  -->

  <div class="space-y-10">

    <!-- Default (no back button) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4">Default</p>
      <div class="bg-white border-t border-base-content/10 flex gap-2 items-center px-6 py-3">
        <div class="flex-1"></div>
        <div class="flex gap-2 items-start shrink-0">
          <button class="inline-flex gap-2 items-center justify-center px-4 py-2.5 rounded-md bg-base-200 border border-base-content/5 text-sm font-semibold text-base-content w-48 hover:bg-base-300 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">
            <i data-lucide="save" class="w-3.5 h-3.5"></i>
            サブCTA
          </button>
          <button class="inline-flex gap-2 items-center justify-center px-4 py-2.5 rounded-md bg-primary border border-base-content/5 text-sm font-semibold text-primary-content w-48 hover:bg-primary-hover transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">
            <i data-lucide="send" class="w-3.5 h-3.5"></i>
            メインCTA
          </button>
        </div>
      </div>
    </div>

    <!-- With Back Button -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4">Back Button</p>
      <div class="bg-white border-t border-base-content/10 flex gap-2 items-center px-6 py-3">
        <button class="inline-flex gap-2 items-center justify-center px-4 py-2.5 rounded-md bg-base-200 border border-base-content/5 text-sm font-semibold text-base-content hover:bg-base-300 transition-colors shrink-0 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">
          <i data-lucide="chevron-left" class="w-3.5 h-3.5"></i>
          戻る
        </button>
        <div class="flex-1"></div>
        <div class="flex gap-2 items-start shrink-0">
          <button class="inline-flex gap-2 items-center justify-center px-4 py-2.5 rounded-md bg-base-200 border border-base-content/5 text-sm font-semibold text-base-content w-48 hover:bg-base-300 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">
            <i data-lucide="save" class="w-3.5 h-3.5"></i>
            サブCTA
          </button>
          <button class="inline-flex gap-2 items-center justify-center px-4 py-2.5 rounded-md bg-primary border border-base-content/5 text-sm font-semibold text-primary-content w-48 hover:bg-primary-hover transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">
            <i data-lucide="send" class="w-3.5 h-3.5"></i>
            メインCTA
          </button>
        </div>
      </div>
    </div>

    <!-- Demo -->
    <!-- demo-skip: Default Back Button -->
    <div id="demo-section" x-data="{ showBack: true }">
      <div class="flex flex-col min-h-80">
        <!-- Content area -->
        <div class="flex-1 space-y-4 p-4">
          <label tabindex="0" class="flex items-center gap-2 cursor-pointer group focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2" @click.prevent="showBack = !showBack" @keydown.enter.prevent="showBack = !showBack">
            <div class="size-5 rounded-sm relative shrink-0" :class="showBack ? 'bg-primary' : 'bg-white shadow-border-base-content-20 group-hover:shadow-border-2-primary'">
              <svg x-show="showBack" class="absolute inset-0 w-full h-full text-white p-0.5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
            </div>
            <span class="text-sm leading-5 text-base-content">戻るボタンを表示</span>
          </label>
          <div class="space-y-3">
            <template x-for="i in 4" :key="i">
              <div class="h-10 bg-base-200 rounded-lg"></div>
            </template>
          </div>
        </div>
        <!-- Sticky Footer -->
        <div class="sticky bottom-0 z-30 bg-white border-t border-base-content/10 flex gap-2 items-center px-6 py-3">
          <button x-show="showBack" class="inline-flex gap-2 items-center justify-center px-4 py-2.5 rounded-md bg-base-200 border border-base-content/5 text-sm font-semibold text-base-content hover:bg-base-300 transition-colors shrink-0 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">
            <i data-lucide="chevron-left" class="w-3.5 h-3.5"></i>
            戻る
          </button>
          <div class="flex-1"></div>
          <div class="flex gap-2 items-start shrink-0">
            <button class="inline-flex gap-2 items-center justify-center px-4 py-2.5 rounded-md bg-base-200 border border-base-content/5 text-sm font-semibold text-base-content w-48 hover:bg-base-300 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">
              <i data-lucide="save" class="w-3.5 h-3.5"></i>
              サブCTA
            </button>
            <button class="inline-flex gap-2 items-center justify-center px-4 py-2.5 rounded-md bg-primary border border-base-content/5 text-sm font-semibold text-primary-content w-48 hover:bg-primary-hover transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">
              <i data-lucide="send" class="w-3.5 h-3.5"></i>
              メインCTA
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
