<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; min-height: 100vh !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); var examples = document.getElementById("examples-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "examples" && examples) { document.body.appendChild(examples); Array.from(document.body.children).forEach(function(c) { if (c === examples || c.tagName === "SCRIPT") return; c.remove(); }); } else if (view === "preview") { if (demo) demo.remove(); if (examples) examples.remove(); } }); }</script>

<body class="bg-white p-8 space-y-10">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    FilterArea — 一覧画面の検索フィルタテンプレート
      Type: 見積依頼 / 見積書 / 発注書 / 発注請書 / 請求書 / デマンド / サプライヤー
      Layout: flex items-start gap-4, w-full
      Fields: Input(w-40) / ComboBox(w-40,w-32) / DateRangePicker(w-72) / フリーワード(flex-1)
      All fields: label text-sm text-base-content + input h-8 border border-base-content/20 rounded-md px-3 py-2
      ComboBox: chevron-down icon right
      DateRangePicker: calendar-range icon left, circle-x icon right
      請求書: 2行構成 (Form Row + Status Tabs)
  -->

  <div id="examples-section" class="space-y-10">

  <!-- 見積依頼 -->
  <section>
    <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>見積依頼</p>
    <div class="flex items-start gap-4 w-full max-w-5xl">
      <!-- フリーワード -->
      <div class="flex-1 min-w-0 flex flex-col gap-1">
        <p class="text-sm text-base-content">フリーワード</p>
        <div class="h-8 bg-white border border-base-content/20 rounded-md px-3 py-2 flex items-center">
          <span class="text-sm text-base-content/30"></span>
        </div>
        <p class="text-xs text-base-content/60">複数ワード検索の方法：「配送箱 名古屋」など、半角スペースで区切る</p>
      </div>
      <!-- デマンド -->
      <div class="shrink-0 w-40 flex flex-col gap-1">
        <p class="text-sm text-base-content">デマンド</p>
        <div class="h-8 bg-white border border-base-content/20 rounded-md px-3 py-2 flex items-center gap-2">
          <span class="flex-1 text-sm text-base-content">すべて</span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>
      <!-- サプライヤー -->

        <div class="h-8 bg-white border border-base-content/20 rounded-md px-3 py-2 flex items-center gap-2">
          <span class="flex-1 text-sm text-base-content">すべて</span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>
      <!-- 担当者 -->
      <div class="shrink-0 w-32 flex flex-col gap-1">
        <p class="text-sm text-base-content">担当者</p>
        <div class="h-8 bg-white border border-base-content/20 rounded-md px-3 py-2 flex items-center gap-2">
          <span class="flex-1 text-sm text-base-content">全員</span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>
    </div>
  </section>

    <div class="flex items-start gap-4 w-full max-w-5xl">

    <div class="flex items-start gap-4 w-full max-w-5xl">

        <p class="text-sm text-base-content">受注番号</p>
        <div class="h-8 bg-white border border-base-content/20 rounded-md px-3 py-2 flex items-center">

      </div>
      <div class="shrink-0 w-40 flex flex-col gap-1">

          <span class="flex-1 text-sm text-base-content">すべて</span>

        </div>

      <div class="shrink-0 w-32 flex flex-col gap-1">

  <!-- 請求書 -->
  <section>
    <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>請求書</p>
    <div class="flex flex-col gap-4 w-full max-w-5xl">
