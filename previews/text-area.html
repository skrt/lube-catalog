<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <div class="space-y-10">

    <!-- Sizes -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Sizes</p>
      <div class="flex flex-wrap items-end gap-6">
        <div class="w-[220px] space-y-1">
          <label class="block text-xs text-[#101016]">ラベル</label>
          <textarea rows="1" placeholder="プレースホルダー" class="block w-full h-14 px-2 py-1 text-xs rounded bg-white border border-[rgba(16,16,22,0.2)] placeholder:text-[rgba(16,16,22,0.3)] text-[#101016] outline-none resize-y"></textarea>
          <p class="text-xs text-[rgba(16,16,22,0.6)]">ヘルパーテキスト</p>
          <p class="text-[10px] text-gray-400 mt-1">sm</p>
        </div>
        <div class="w-[220px] space-y-1">
          <label class="block text-sm text-[#101016]">ラベル</label>
          <textarea rows="1" placeholder="プレースホルダー" class="block w-full h-16 px-3 py-2 text-sm rounded bg-white border border-[rgba(16,16,22,0.2)] placeholder:text-[rgba(16,16,22,0.3)] text-[#101016] outline-none resize-y"></textarea>
          <p class="text-xs text-[rgba(16,16,22,0.6)]">ヘルパーテキスト</p>
          <p class="text-[10px] text-gray-400 mt-1">md</p>
        </div>
        <div class="w-[220px] space-y-1">
          <label class="block text-base text-[#101016]">ラベル</label>
          <textarea rows="1" placeholder="プレースホルダー" class="block w-full h-[72px] px-3 py-2 text-base rounded bg-white border border-[rgba(16,16,22,0.2)] placeholder:text-[rgba(16,16,22,0.3)] text-[#101016] outline-none resize-y"></textarea>
          <p class="text-xs text-[rgba(16,16,22,0.6)]">ヘルパーテキスト</p>
          <p class="text-[10px] text-gray-400 mt-1">lg</p>
        </div>
      </div>
    </div>

    <!-- States -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">States</p>
      <div class="flex flex-wrap items-start gap-4">
        <div class="w-[200px] space-y-1">
          <label class="block text-sm text-[#101016]">ラベル</label>
          <textarea rows="1" placeholder="プレースホルダー" class="block w-full h-16 px-3 py-2 text-sm rounded bg-white border border-[rgba(16,16,22,0.2)] placeholder:text-[rgba(16,16,22,0.3)] text-[#101016] outline-none resize-y"></textarea>
          <p class="text-xs text-[rgba(16,16,22,0.6)]">ヘルパーテキスト</p>
          <p class="text-[10px] text-gray-400 mt-1">Default</p>
        </div>
        <div class="w-[200px] space-y-1">
          <label class="block text-sm text-[#101016]">ラベル</label>
          <textarea rows="1" placeholder="プレースホルダー" class="block w-full h-16 px-3 py-2 text-sm rounded bg-white border-2 border-[#0a0ac2] placeholder:text-[rgba(16,16,22,0.3)] text-[#101016] outline-none resize-y"></textarea>
          <p class="text-xs text-[rgba(16,16,22,0.6)]">ヘルパーテキスト</p>
          <p class="text-[10px] text-gray-400 mt-1">Focus</p>
        </div>
        <div class="w-[200px] space-y-1">
          <label class="block text-sm text-[#101016]">ラベル</label>
          <textarea rows="1" placeholder="プレースホルダー" class="block w-full h-16 px-3 py-2 text-sm rounded bg-white border-2 border-[#c94043] placeholder:text-[rgba(16,16,22,0.3)] text-[#101016] outline-none resize-y"></textarea>
          <p class="text-xs text-[rgba(16,16,22,0.6)]">ヘルパーテキスト</p>
          <p class="text-[10px] text-gray-400 mt-1">Error</p>
        </div>
        <div class="w-[200px] space-y-1">
          <label class="block text-sm text-[#101016]">ラベル</label>
          <textarea rows="1" placeholder="プレースホルダー" disabled class="block w-full h-16 px-3 py-2 text-sm rounded bg-[#f8f8fa] border border-[rgba(16,16,22,0.1)] placeholder:text-[rgba(16,16,22,0.3)] text-[#101016] outline-none resize-y cursor-not-allowed"></textarea>
          <p class="text-xs text-[rgba(16,16,22,0.6)]">ヘルパーテキスト</p>
          <p class="text-[10px] text-gray-400 mt-1">Disabled</p>
        </div>
        <div class="w-[200px] space-y-1">
          <label class="block text-sm text-[#101016]">ラベル</label>
          <textarea rows="1" class="block w-full h-16 px-3 py-2 text-sm rounded bg-white border border-[rgba(16,16,22,0.2)] text-[#101016] outline-none resize-y">プレースホルダー</textarea>
          <p class="text-xs text-[rgba(16,16,22,0.6)]">ヘルパーテキスト</p>
          <p class="text-[10px] text-gray-400 mt-1">Filled</p>
        </div>
      </div>
    </div>

    <!-- Required -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Required</p>
      <div class="flex flex-wrap items-start gap-6">
        <div class="w-[220px] space-y-1">
          <label class="block text-sm text-[#101016]">ラベル <span class="text-[#c94043]">*</span></label>
          <textarea rows="1" placeholder="プレースホルダー" class="block w-full h-16 px-3 py-2 text-sm rounded bg-white border border-[rgba(16,16,22,0.2)] placeholder:text-[rgba(16,16,22,0.3)] text-[#101016] outline-none resize-y"></textarea>
          <p class="text-xs text-[rgba(16,16,22,0.6)]">ヘルパーテキスト</p>
          <p class="text-[10px] text-gray-400 mt-1">Default</p>
        </div>
        <div class="w-[220px] space-y-1">
          <label class="block text-sm text-[#101016]">ラベル <span class="text-[#c94043]">*</span></label>
          <textarea rows="1" placeholder="プレースホルダー" class="block w-full h-16 px-3 py-2 text-sm rounded bg-white border-2 border-[#c94043] placeholder:text-[rgba(16,16,22,0.3)] text-[#101016] outline-none resize-y"></textarea>
          <p class="text-xs text-[#c94043]">入力しましょう</p>
          <p class="text-[10px] text-gray-400 mt-1">Error + エラーテキスト</p>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
