<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
@theme {
  --color-primary: #0a0ac2;
  --color-primary-hover: #080892;
  --color-primary-content: #f3f4fe;
  --color-secondary: #e8e8fd;
  --color-secondary-hover: #e0e0f5;
  --color-secondary-content: #0a0ac2;
  --color-base-content: #101016;
  --color-base-200: #f8f8fa;
  --color-base-300: #eeeef2;
  --color-error: #c94043;
  --color-error-hover: #b7393c;
  --color-error-content: #fff5f5;
  --color-error-soft: #f7e2e3;
  --color-success: #479d72;
  --color-success-content: #f5fef9;
  --color-success-soft: #e3f0ea;
  --color-warning: #de781f;
  --color-warning-content: #fffcf8;
  --color-warning-soft: #faebdd;
  --color-info: #535671;
  --color-info-content: #f2f4ff;
  --color-info-soft: #e5e6ea;
  --radius-sm: 4px;
  --shadow-border-base-content-5: inset 0 0 0 1px rgba(16, 16, 22, 0.05);
  --shadow-border-base-content-10: inset 0 0 0 1px rgba(16, 16, 22, 0.1);
  --shadow-border-base-content-20: inset 0 0 0 1px rgba(16, 16, 22, 0.2);
  --shadow-border-2-base-content-10: inset 0 0 0 2px rgba(16, 16, 22, 0.1);
  --shadow-border-2-base-content-20: inset 0 0 0 2px rgba(16, 16, 22, 0.2);
  --shadow-border-primary: inset 0 0 0 1px #0a0ac2;
  --shadow-border-2-primary: inset 0 0 0 2px #0a0ac2;
  --shadow-border-error: inset 0 0 0 1px #c94043;
  --shadow-border-2-error: inset 0 0 0 2px #c94043;
}
</style>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; min-height: 200px !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    Breadcrumbs: パンくずナビゲーション
      Container: flex, gap-2 (8px), items-center
      Item: flex, gap-2 (8px) between chevron and content
      Content: flex, gap-1 (4px) between icon and label
      Separator: chevron-right icon, 14px, text-base-content/60
      Default text: text-sm (14px), leading-5, text-base-content/60 (rgba(16,16,22,0.6))
      Current text: text-sm (14px), leading-5, text-base-content (#101016)
      Icon (optional): 14px, instance swap
  -->

  <div class="space-y-10">

    <!-- Composition Example -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Default</p>
      <div class="flex gap-2 items-center">
        <div class="flex gap-1 items-center">
          <span tabindex="0" class="text-sm leading-5 text-base-content/60 hover:underline cursor-pointer focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">デマンド</span>
        </div>
        <svg class="w-3.5 h-3.5 shrink-0 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        <div class="flex gap-1 items-center">
          <span tabindex="0" class="text-sm leading-5 text-base-content/60 hover:underline cursor-pointer focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">株式会社コトハ商事</span>
        </div>
        <svg class="w-3.5 h-3.5 shrink-0 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        <div class="flex gap-1 items-center">
          <span tabindex="0" class="text-sm leading-5 text-base-content/60 hover:underline cursor-pointer focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">商品一覧</span>
        </div>
        <svg class="w-3.5 h-3.5 shrink-0 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        <div class="flex gap-1 items-center">
          <span class="text-sm leading-5 text-base-content">衣類配送用BOX</span>
        </div>
      </div>
    </div>

    <!-- Item Types -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Item Types</p>
      <div class="flex flex-col gap-3">
        <div class="flex gap-2 items-center">
          <svg class="w-3.5 h-3.5 shrink-0 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
          <span tabindex="0" class="text-sm leading-5 text-base-content/60 hover:underline cursor-pointer focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">Default</span>
        </div>
        <div class="flex gap-2 items-center">
          <svg class="w-3.5 h-3.5 shrink-0 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
          <span class="text-sm leading-5 text-base-content">Current</span>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
