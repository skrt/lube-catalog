<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../tailwind.config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 24px 24px !important; min-height: 200px !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    Calc: 金額計算カード
      Container: w-[240px], flex-col, gap-3 (12px)
      Row: flex, gap-2 (8px), h-5, items-center
        Label: text-sm, text-base-content
        Line: h-px, flex-1, bg base-content/5
        Value: text-sm monospace (font-family/number), text-base-content, text-right
      Sub row (粗利): pl-2, bar 2px×16px bg base-content/10, text-xs, text-base-content/60
      Breakdown: pl-2, vertical bar 2px full-height bg base-content/10
        Items: text-xs text-base-content/60, value also base-content/60
      Total: text-sm semibold (both label and value)
      Checkbox: sm size, "合計金額を見積書に表示"
      Boolean: showProfit, showTax, showBreakdown, showCheckbox
  -->

  <div class="space-y-10">

    <!-- Full -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Full</p>
      <div class="flex flex-col gap-3 w-[240px]">
        <div class="flex flex-col gap-2">
          <!-- 小計 -->
          <div class="flex gap-2 h-5 items-center">
            <span class="text-sm leading-5 text-base-content">小計</span>
            <div class="flex-1 min-w-0 h-px bg-base-content/5"></div>
            <span class="text-sm leading-5 text-base-content font-mono tabular-nums">3,000</span>
          </div>
          <!-- 粗利 -->
          <div class="flex gap-2 h-5 items-center">
            <div class="flex gap-2 items-center pl-2">
              <div class="w-0.5 h-4 bg-base-content/10"></div>
              <span class="text-xs leading-4 text-base-content/60">粗利(12.5%)</span>
            </div>
            <div class="flex-1 min-w-0 h-px bg-base-content/5"></div>
            <span class="text-sm leading-5 text-base-content font-mono tabular-nums">3,000</span>
          </div>
          <!-- 消費税 -->
          <div class="flex gap-2 h-5 items-center">
            <span class="text-sm leading-5 text-base-content">消費税</span>
            <div class="flex-1 min-w-0 h-px bg-base-content/5"></div>
            <span class="text-sm leading-5 text-base-content font-mono tabular-nums">500</span>
          </div>
          <!-- 内訳 -->
          <div class="flex gap-2 items-start pl-2 w-full">
            <div class="w-0.5 self-stretch bg-base-content/10"></div>
            <div class="flex flex-col gap-1 flex-1 min-w-0">
              <div class="flex gap-2 items-center">
                <span class="text-xs leading-4 text-base-content/60">10%対象</span>
                <div class="flex-1 min-w-0 h-px bg-base-content/5"></div>
                <span class="text-sm leading-5 text-base-content/60 font-mono tabular-nums">500</span>
              </div>
              <div class="flex gap-2 items-center">
                <span class="text-xs leading-4 text-base-content/60">軽減8%対象</span>
                <div class="flex-1 min-w-0 h-px bg-base-content/5"></div>
                <span class="text-sm leading-5 text-base-content/60 font-mono tabular-nums">1,000</span>
              </div>
              <div class="flex gap-2 items-center">
                <span class="text-xs leading-4 text-base-content/60">対象外</span>
                <div class="flex-1 min-w-0 h-px bg-base-content/5"></div>
                <span class="text-sm leading-5 text-base-content/60 font-mono tabular-nums">1,500</span>
              </div>
            </div>
          </div>
          <!-- 合計金額 -->
          <div class="flex gap-2 h-5 items-center">
            <span class="text-sm font-semibold leading-5 text-base-content">合計金額</span>
            <div class="flex-1 min-w-0 h-px bg-base-content/5"></div>
            <span class="text-sm font-semibold leading-5 text-base-content font-mono tabular-nums">3,500</span>
          </div>
        </div>
        <!-- Checkbox -->
        <div class="flex gap-2 items-center cursor-pointer group" x-data="{ checked: false }" @click="checked = !checked">
          <div class="relative shrink-0 size-4 rounded"
            :class="checked ? 'bg-primary' : 'bg-white shadow-border-base-content-20 group-hover:shadow-border-2-primary'">
            <svg x-show="checked" class="absolute inset-0 w-full h-full text-white p-0.5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <span class="text-xs leading-4 text-base-content">合計金額を見積書に表示</span>
        </div>
      </div>
    </div>

    <!-- Minimal (Total only) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Minimal</p>
      <div class="flex flex-col gap-3 w-[240px]">
        <div class="flex flex-col gap-2">
          <div class="flex gap-2 h-5 items-center">
            <span class="text-sm leading-5 text-base-content">小計</span>
            <div class="flex-1 min-w-0 h-px bg-base-content/5"></div>
            <span class="text-sm leading-5 text-base-content font-mono tabular-nums">3,000</span>
          </div>
          <div class="flex gap-2 h-5 items-center">
            <span class="text-sm font-semibold leading-5 text-base-content">合計金額</span>
            <div class="flex-1 min-w-0 h-px bg-base-content/5"></div>
            <span class="text-sm font-semibold leading-5 text-base-content font-mono tabular-nums">3,000</span>
          </div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
