<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../tailwind.config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 40px !important; min-height: 460px !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8 space-y-10">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!-- Interactive Demo -->
  <section id="demo-section" x-data="{ open: false, selected: '', options: ['アジマット株式会社', '株式会社 木下印刷', '株式会社 サンレル', 'BAY化粧品', '株式会社ハツコ', 'クボヤ工業株式会社', 'マルシメ株式会社'] }">
    <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Interactive Demo</p>
    <div class="w-72 space-y-1">
      <label class="block text-sm text-base-content">取引先 <span class="text-error">*</span></label>
      <div class="relative">
        <div
          @click="open = !open"
          @click.away="open = false"
          class="flex items-center h-8 px-3 py-2 gap-2 rounded bg-white cursor-pointer transition-colors"
          :class="open ? 'border-2 border-primary' : 'border border-base-content/20'"
        >
          <span class="flex-1 text-sm truncate" :class="selected ? 'text-base-content' : 'text-base-content/30'" x-text="selected || '選択しましょう'"></span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/60 transition-transform" :class="open && 'rotate-180'" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <div x-show="open" x-transition class="absolute top-full left-0 w-full mt-1 max-h-60 overflow-y-auto py-1 bg-white border border-base-content/10 rounded shadow-lg z-10">
          <template x-for="option in options" :key="option">
            <div
              @click="selected = option; open = false"
              class="flex items-center px-3 py-2 cursor-pointer text-sm text-base-content hover:bg-base-200"
              :class="selected === option && '!bg-secondary !text-primary'"
            >
              <span x-text="option"></span>
            </div>
          </template>
        </div>
      </div>
      <p class="text-xs text-base-content/60">クリックして選択してみてください</p>
    </div>
  </section>

  <!-- Sizes -->
  <section>
    <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Sizes</p>
    <div class="flex flex-wrap items-end gap-6">
      <div class="w-56 space-y-1">
        <label class="block text-xs text-base-content">sm</label>
        <div class="flex items-center h-6 px-2 py-1 gap-2 border border-base-content/20 rounded bg-white">
          <span class="flex-1 text-xs text-base-content truncate">選択しましょう</span>
          <svg class="shrink-0 w-3 h-3 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
      <div class="w-56 space-y-1">
        <label class="block text-sm text-base-content">md</label>
        <div class="flex items-center h-8 px-3 py-2 gap-2 border border-base-content/20 rounded bg-white">
          <span class="flex-1 text-sm text-base-content truncate">選択しましょう</span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
      <div class="w-56 space-y-1">
        <label class="block text-base text-base-content">lg</label>
        <div class="flex items-center h-10 px-3 py-2 gap-2 border border-base-content/20 rounded bg-white">
          <span class="flex-1 text-base text-base-content truncate">選択しましょう</span>
          <svg class="shrink-0 w-4 h-4 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
    </div>
  </section>

  <!-- States -->
  <section>
    <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>States</p>
    <div class="flex flex-wrap items-start gap-4">
      <div class="w-52 space-y-1">
        <label class="block text-sm text-base-content">Default</label>
        <div class="flex items-center h-8 px-3 py-2 gap-2 border border-base-content/20 rounded bg-white">
          <span class="flex-1 text-sm text-base-content truncate">選択しましょう</span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
      <div class="w-52 space-y-1">
        <label class="block text-sm text-base-content">Focus</label>
        <div class="flex items-center h-8 px-3 py-2 gap-2 border-2 border-primary rounded bg-white">
          <span class="flex-1 text-sm text-base-content truncate">選択しましょう</span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
      <div class="w-52 space-y-1">
        <label class="block text-sm text-base-content">Error</label>
        <div class="flex items-center h-8 px-3 py-2 gap-2 border-2 border-error rounded bg-white">
          <span class="flex-1 text-sm text-base-content truncate">選択しましょう</span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
      <div class="w-52 space-y-1">
        <label class="block text-sm text-base-content">Disabled</label>
        <div class="flex items-center h-8 px-3 py-2 gap-2 border border-base-content/10 rounded bg-base-200 cursor-not-allowed">
          <span class="flex-1 text-sm text-base-content/30 truncate">選択しましょう</span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
    </div>
  </section>

  <!-- SelectMenu Item States -->
  <section>
    <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>SelectMenu Item States</p>
    <div class="w-72 border border-base-content/10 rounded shadow-lg overflow-hidden">
      <div class="flex items-center px-3 py-2 text-sm text-base-content">Default</div>
      <div class="flex items-center px-3 py-2 text-sm text-base-content bg-base-200">Hover</div>
      <div class="flex items-center px-3 py-2 text-sm text-primary bg-secondary">Selected</div>
      <div class="flex items-center px-3 py-2 text-sm text-base-content/30">Disabled</div>
    </div>
  </section>

  <!-- SelectMenu Empty State -->
  <section>
    <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>SelectMenu Empty</p>
    <div class="w-72 border border-base-content/10 rounded shadow-lg overflow-hidden">
      <div class="flex items-center px-3 py-2 text-sm text-base-content/30">該当する選択肢がありません</div>
    </div>
  </section>

</body>
</html>
