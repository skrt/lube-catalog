<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
@theme {
  --color-primary: #0a0ac2;
  --color-primary-hover: #080892;
  --color-primary-content: #f3f4fe;
  --color-secondary: #e8e8fd;
  --color-secondary-hover: #e0e0f5;
  --color-secondary-content: #0a0ac2;
  --color-base-content: #101016;
  --color-base-200: #f8f8fa;
  --color-base-300: #eeeef2;
  --color-error: #c94043;
  --color-error-hover: #b7393c;
  --color-error-content: #fff5f5;
  --color-error-soft: #f7e2e3;
  --color-success: #479d72;
  --color-success-content: #f5fef9;
  --color-success-soft: #e3f0ea;
  --color-warning: #de781f;
  --color-warning-content: #fffcf8;
  --color-warning-soft: #faebdd;
  --color-info: #535671;
  --color-info-content: #f2f4ff;
  --color-info-soft: #e5e6ea;
  --radius-sm: 4px;
  --shadow-border-base-content-5: inset 0 0 0 1px rgba(16, 16, 22, 0.05);
  --shadow-border-base-content-10: inset 0 0 0 1px rgba(16, 16, 22, 0.1);
  --shadow-border-base-content-20: inset 0 0 0 1px rgba(16, 16, 22, 0.2);
  --shadow-border-2-base-content-10: inset 0 0 0 2px rgba(16, 16, 22, 0.1);
  --shadow-border-2-base-content-20: inset 0 0 0 2px rgba(16, 16, 22, 0.2);
  --shadow-border-primary: inset 0 0 0 1px #0a0ac2;
  --shadow-border-2-primary: inset 0 0 0 2px #0a0ac2;
  --shadow-border-error: inset 0 0 0 1px #c94043;
  --shadow-border-2-error: inset 0 0 0 2px #c94043;
}
</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; min-height: 460px !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8 space-y-10">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!-- Interactive Demo -->
  <section id="demo-section" x-data="selectDemo()">
    <script data-demo-keep>
      function selectDemo() {
        return {
          open: false,
          selected: '',
          activeIndex: -1,
          options: ['アジマット株式会社', '株式会社 木下印刷', '株式会社 サンレル', 'BAY化粧品', '株式会社ハツコ', 'クボヤ工業株式会社', 'マルシメ株式会社'],
          select(o) { this.selected = o; this.open = false; this.activeIndex = -1; },
          onArrowDown() { if (!this.open) this.open = true; this.activeIndex = Math.min(this.activeIndex + 1, this.options.length - 1); this.$nextTick(() => this.scrollToActive()); },
          onArrowUp() { this.activeIndex = Math.max(this.activeIndex - 1, 0); this.$nextTick(() => this.scrollToActive()); },
          onEnter() { if (this.open && this.activeIndex >= 0) { this.select(this.options[this.activeIndex]); } else { this.open = true; } },
          onEscape() { this.open = false; this.activeIndex = -1; },
          scrollToActive() {
            const menu = this.$refs.menu;
            if (!menu) return;
            const item = menu.querySelector('[data-active="true"]');
            if (item) item.scrollIntoView({ block: 'nearest' });
          }
        };
      }
    </script>
    <div class="w-72 space-y-1">
      <label class="block text-sm text-base-content">取引先 <span class="text-error">*</span></label>
      <div class="relative" @click.away="open = false; activeIndex = -1">
        <div
          @click="open = !open; activeIndex = -1"
          @keydown.arrow-down.prevent="onArrowDown()"
          @keydown.arrow-up.prevent="onArrowUp()"
          @keydown.enter.prevent="onEnter()"
          @keydown.escape="onEscape()"
          @keydown.tab="open = false"
          tabindex="0"
          class="flex items-center h-8 gap-2 rounded-md bg-white cursor-pointer outline-none"
          :class="open ? 'border-2 border-primary px-[11px] py-[7px]' : 'border border-base-content/20 px-3 py-2'"
        >
          <span class="flex-1 text-sm truncate" :class="selected ? 'text-base-content' : 'text-base-content/30'" x-text="selected || '選択しましょう'"></span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/60 transition-transform" :class="open && 'rotate-180'" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <div x-show="open" x-transition x-ref="menu" class="absolute top-full left-0 w-full mt-1 max-h-60 overflow-y-auto py-1 bg-white border border-base-content/10 rounded-md shadow-lg z-10">
          <template x-for="(option, idx) in options" :key="option">
            <div
              @click="select(option)"
              @mouseenter="activeIndex = idx"
              :data-active="activeIndex === idx"
              class="flex items-center px-3 py-2 cursor-pointer text-sm text-base-content"
              :class="activeIndex === idx ? 'bg-base-200' : (selected === option ? 'bg-secondary text-primary' : 'hover:bg-base-200')"
            >
              <span x-text="option"></span>
            </div>
          </template>
        </div>
      </div>
      <p class="text-xs text-base-content/60">クリック or ↑↓キーで選択</p>
    </div>
  </section>

  <!-- Sizes -->
  <section>
    <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Sizes</p>
    <div class="flex flex-wrap items-end gap-6">
      <div class="w-56 space-y-1">
        <label class="block text-xs text-base-content">sm</label>
        <div class="flex items-center h-6 px-2 py-1 gap-2 border border-base-content/20 rounded-md bg-white">
          <span class="flex-1 text-xs text-base-content truncate">選択しましょう</span>
          <svg class="shrink-0 w-3 h-3 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
      <div class="w-56 space-y-1">
        <label class="block text-sm text-base-content">md</label>
        <div class="flex items-center h-8 px-3 py-2 gap-2 border border-base-content/20 rounded-md bg-white">
          <span class="flex-1 text-sm text-base-content truncate">選択しましょう</span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
      <div class="w-56 space-y-1">
        <label class="block text-base text-base-content">lg</label>
        <div class="flex items-center h-10 px-3 py-2 gap-2 border border-base-content/20 rounded-md bg-white">
          <span class="flex-1 text-base text-base-content truncate">選択しましょう</span>
          <svg class="shrink-0 w-4 h-4 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
    </div>
  </section>

  <!-- States -->
  <section>
    <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>States</p>
    <div class="flex flex-wrap items-start gap-4">
      <div class="w-52 space-y-1">
        <label class="block text-sm text-base-content">Default</label>
        <div class="flex items-center h-8 px-3 py-2 gap-2 border border-base-content/20 rounded-md bg-white">
          <span class="flex-1 text-sm text-base-content truncate">選択しましょう</span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
      <div class="w-52 space-y-1">
        <label class="block text-sm text-base-content">Focus</label>
        <div class="flex items-center h-8 px-[11px] py-[7px] gap-2 border-2 border-primary rounded-md bg-white">
          <span class="flex-1 text-sm text-base-content truncate">選択しましょう</span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
      <div class="w-52 space-y-1">
        <label class="block text-sm text-base-content">Error</label>
        <div class="flex items-center h-8 px-[11px] py-[7px] gap-2 border-2 border-error rounded-md bg-white">
          <span class="flex-1 text-sm text-base-content truncate">選択しましょう</span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
      <div class="w-52 space-y-1">
        <label class="block text-sm text-base-content">Disabled</label>
        <div class="flex items-center h-8 px-3 py-2 gap-2 border border-base-content/10 rounded-md bg-base-200 cursor-not-allowed">
          <span class="flex-1 text-sm text-base-content/30 truncate">選択しましょう</span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
      <div class="w-52 space-y-1">
        <label class="block text-sm text-base-content">Filled</label>
        <div class="flex items-center h-8 px-3 py-2 gap-2 border border-base-content/20 rounded-md bg-white">
          <span class="flex-1 text-sm text-base-content truncate">ダンボール</span>
          <svg class="shrink-0 w-3.5 h-3.5 text-base-content/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="text-xs text-base-content/60">ヘルパーテキスト</p>
      </div>
    </div>
  </section>

  <!-- Menu Item States -->
  <section>
    <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Menu Item States</p>
    <div class="w-72 border border-base-content/10 rounded-md shadow-lg overflow-hidden">
      <div class="flex items-center px-3 py-2 text-sm text-base-content">Default</div>
      <div class="flex items-center px-3 py-2 text-sm text-base-content bg-base-200">Hover</div>
      <div class="flex items-center px-3 py-2 text-sm text-primary bg-secondary">Selected</div>
      <div class="flex items-center px-3 py-2 text-sm text-base-content/30">Disabled</div>
    </div>
  </section>

  <!-- Menu Empty State -->
  <section>
    <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Menu Empty</p>
    <div class="w-72 border border-base-content/10 rounded-md shadow-lg overflow-hidden">
      <div class="flex items-center px-3 py-2 text-sm text-base-content/30">該当する選択肢がありません</div>
    </div>
  </section>

</body>
</html>
