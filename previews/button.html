<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 40px !important; min-height: 100vh !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    Primary:   bg #0a0ac2, hover #080892, text #f3f4fe
    Secondary: bg #e8e8fd, hover #e0e0f5, text #0a0ac2
    Tertiary:  bg #f8f8fa, hover #eeeef2, text #101016
    Danger:    bg #c94043, hover #b7393c, text #fff5f5
    Disabled:  bg #eeeef2, text rgba(16,16,22,0.3)
    Border:    rgba(16,16,22,0.05)
    Radius:    4px (rounded)
    Sizes:     lg (px-4 py-2.5 text-sm icon-3.5) / md (px-3 py-2 text-xs icon-3.5) / sm (px-2 py-1 text-xs icon-3)
  -->

  <div class="space-y-10">

    <!-- Color Variants (lg size) -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Color Variants</p>
      <div class="flex flex-wrap items-center gap-4">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#f3f4fe] rounded bg-[#0a0ac2] border border-[rgba(16,16,22,0.05)] hover:bg-[#080892] transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          Primary
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#0a0ac2] rounded bg-[#e8e8fd] border border-[rgba(16,16,22,0.05)] hover:bg-[#e0e0f5] transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          Secondary
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#101016] rounded bg-[#f8f8fa] border border-[rgba(16,16,22,0.05)] hover:bg-[#eeeef2] transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          Tertiary
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#fff5f5] rounded bg-[#c94043] border border-[rgba(16,16,22,0.05)] hover:bg-[#b7393c] transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          Danger
        </button>
      </div>
    </div>

    <!-- Sizes (Primary) -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Sizes</p>
      <div class="flex flex-wrap items-end gap-4">
        <button class="inline-flex items-center gap-2 px-2 py-1 text-xs font-semibold text-[#f3f4fe] rounded bg-[#0a0ac2] border border-[rgba(16,16,22,0.05)] hover:bg-[#080892] transition-colors">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          sm
        </button>
        <button class="inline-flex items-center gap-2 px-3 py-2 text-xs font-semibold text-[#f3f4fe] rounded bg-[#0a0ac2] border border-[rgba(16,16,22,0.05)] hover:bg-[#080892] transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          md
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#f3f4fe] rounded bg-[#0a0ac2] border border-[rgba(16,16,22,0.05)] hover:bg-[#080892] transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          lg
        </button>
      </div>
    </div>

    <!-- States (Primary) -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">States (Primary)</p>
      <div class="flex flex-wrap items-center gap-3">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#f3f4fe] rounded bg-[#0a0ac2] border border-[rgba(16,16,22,0.05)] transition-colors">
          Default
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#f3f4fe] rounded bg-[#080892] border border-[rgba(16,16,22,0.05)] transition-colors">
          Hover
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[rgba(16,16,22,0.3)] rounded bg-[#eeeef2] cursor-not-allowed">
          Disabled
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[rgba(16,16,22,0.3)] rounded bg-[#eeeef2] cursor-not-allowed">
          <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2" opacity="0.3"/>
            <path d="M14 8a6 6 0 0 0-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Loading
        </button>
      </div>
    </div>

    <!-- States (Secondary) -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">States (Secondary)</p>
      <div class="flex flex-wrap items-center gap-3">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#0a0ac2] rounded bg-[#e8e8fd] border border-[rgba(16,16,22,0.05)] transition-colors">
          Default
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#0a0ac2] rounded bg-[#e0e0f5] border border-[rgba(16,16,22,0.05)] transition-colors">
          Hover
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[rgba(16,16,22,0.3)] rounded bg-[#eeeef2] cursor-not-allowed">
          Disabled
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[rgba(16,16,22,0.3)] rounded bg-[#eeeef2] cursor-not-allowed">
          <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2" opacity="0.3"/>
            <path d="M14 8a6 6 0 0 0-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Loading
        </button>
      </div>
    </div>

    <!-- States (Tertiary) -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">States (Tertiary)</p>
      <div class="flex flex-wrap items-center gap-3">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#101016] rounded bg-[#f8f8fa] border border-[rgba(16,16,22,0.05)] transition-colors">
          Default
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#101016] rounded bg-[#eeeef2] border border-[rgba(16,16,22,0.05)] transition-colors">
          Hover
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[rgba(16,16,22,0.3)] rounded bg-[#eeeef2] cursor-not-allowed">
          Disabled
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[rgba(16,16,22,0.3)] rounded bg-[#eeeef2] cursor-not-allowed">
          <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2" opacity="0.3"/>
            <path d="M14 8a6 6 0 0 0-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Loading
        </button>
      </div>
    </div>

    <!-- States (Danger) -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">States (Danger)</p>
      <div class="flex flex-wrap items-center gap-3">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#fff5f5] rounded bg-[#c94043] border border-[rgba(16,16,22,0.05)] transition-colors">
          Default
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#fff5f5] rounded bg-[#b7393c] border border-[rgba(16,16,22,0.05)] transition-colors">
          Hover
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[rgba(16,16,22,0.3)] rounded bg-[#eeeef2] cursor-not-allowed">
          Disabled
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[rgba(16,16,22,0.3)] rounded bg-[#eeeef2] cursor-not-allowed">
          <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2" opacity="0.3"/>
            <path d="M14 8a6 6 0 0 0-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Loading
        </button>
      </div>
    </div>

    <!-- Icon Options (lg size, Primary) -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Icon Options</p>
      <div class="flex flex-wrap items-center gap-3">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#f3f4fe] rounded bg-[#0a0ac2] border border-[rgba(16,16,22,0.05)] hover:bg-[#080892] transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          Both
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#f3f4fe] rounded bg-[#0a0ac2] border border-[rgba(16,16,22,0.05)] hover:bg-[#080892] transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          Left only
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#f3f4fe] rounded bg-[#0a0ac2] border border-[rgba(16,16,22,0.05)] hover:bg-[#080892] transition-colors">
          Right only
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-[#f3f4fe] rounded bg-[#0a0ac2] border border-[rgba(16,16,22,0.05)] hover:bg-[#080892] transition-colors">
          No icon
        </button>
      </div>
    </div>

  </div>

</body>
</html>
