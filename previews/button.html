<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'primary': {
          DEFAULT: '#0a0ac2',
          hover: '#080892',
          content: '#f3f4fe',
        },
        'secondary': {
          DEFAULT: '#e8e8fd',
          hover: '#e0e0f5',
          content: '#0a0ac2',
        },
        'base-content': 'rgb(16 16 22 / <alpha-value>)',
        'base-200': '#f8f8fa',
        'base-300': '#eeeef2',
        'error': {
          DEFAULT: '#c94043',
          hover: '#b7393c',
          content: '#fff5f5',
          'bg': '#f7e2e3',
        },
        'success': {
          DEFAULT: '#479d72',
          content: '#f5fef9',
          'bg': '#e3f0ea',
        },
        'warning': {
          DEFAULT: '#de781f',
          content: '#fffcf8',
          'bg': '#faebdd',
        },
        'info': {
          DEFAULT: '#535671',
          content: '#f2f4ff',
          'bg': '#e5e6ea',
        },
      },
      borderRadius: {
        'sm': '4px',
      },
      boxShadow: {
        'border-base-content-5': 'inset 0 0 0 1px rgba(16, 16, 22, 0.05)',
        'border-base-content-10': 'inset 0 0 0 1px rgba(16, 16, 22, 0.1)',
        'border-base-content-20': 'inset 0 0 0 1px rgba(16, 16, 22, 0.2)',
        'border-2-base-content-10': 'inset 0 0 0 2px rgba(16, 16, 22, 0.1)',
        'border-2-base-content-20': 'inset 0 0 0 2px rgba(16, 16, 22, 0.2)',
        'border-primary': 'inset 0 0 0 1px #0a0ac2',
        'border-2-primary': 'inset 0 0 0 2px #0a0ac2',
        'border-error': 'inset 0 0 0 1px #c94043',
        'border-2-error': 'inset 0 0 0 2px #c94043',
      },
    },
  },
};
</script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 24px 24px !important; min-height: 100vh !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    Primary:   bg #0a0ac2, hover #080892, text #f3f4fe
    Secondary: bg #e8e8fd, hover #e0e0f5, text #0a0ac2
    Tertiary:  bg #f8f8fa, hover #eeeef2, text #101016
    Danger:    bg #c94043, hover #b7393c, text #fff5f5
    Disabled:  bg #eeeef2, text rgba(16,16,22,0.3)
    Border:    rgba(16,16,22,0.05)
    Radius:    4px (rounded)
    Sizes:     lg (px-4 py-2.5 text-sm icon-3.5) / md (px-3 py-2 text-xs icon-3.5) / sm (px-2 py-1 text-xs icon-3)
  -->

  <div class="space-y-10">

    <!-- Color Variants (lg size) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Color Variants</p>
      <div class="flex flex-wrap items-center gap-4">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-primary-content rounded-sm bg-primary border border-base-content/5 hover:bg-primary-hover transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          Primary
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-primary rounded-sm bg-secondary border border-base-content/5 hover:bg-secondary-hover transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          Secondary
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-base-content rounded-sm bg-base-200 border border-base-content/5 hover:bg-base-300 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          Tertiary
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-error-content rounded-sm bg-error border border-base-content/5 hover:bg-error-hover transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          Danger
        </button>
      </div>
    </div>

    <!-- Sizes (Primary) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Sizes</p>
      <div class="flex flex-wrap items-end gap-4">
        <button class="inline-flex items-center gap-2 px-2 py-1 text-xs font-semibold text-primary-content rounded-sm bg-primary border border-base-content/5 hover:bg-primary-hover transition-colors">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          sm
        </button>
        <button class="inline-flex items-center gap-2 px-3 py-2 text-xs font-semibold text-primary-content rounded-sm bg-primary border border-base-content/5 hover:bg-primary-hover transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          md
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-primary-content rounded-sm bg-primary border border-base-content/5 hover:bg-primary-hover transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          lg
        </button>
      </div>
    </div>

    <!-- States (Primary) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>States (Primary)</p>
      <div class="flex flex-wrap items-center gap-3">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-primary-content rounded-sm bg-primary border border-base-content/5 transition-colors">
          Default
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-primary-content rounded-sm bg-primary-hover border border-base-content/5 transition-colors">
          Hover
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-base-content/30 rounded-sm bg-base-300 cursor-not-allowed">
          Disabled
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-base-content/30 rounded-sm bg-base-300 cursor-not-allowed">
          <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2" opacity="0.3"/>
            <path d="M14 8a6 6 0 0 0-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Loading
        </button>
      </div>
    </div>

    <!-- States (Secondary) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>States (Secondary)</p>
      <div class="flex flex-wrap items-center gap-3">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-primary rounded-sm bg-secondary border border-base-content/5 transition-colors">
          Default
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-primary rounded-sm bg-secondary-hover border border-base-content/5 transition-colors">
          Hover
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-base-content/30 rounded-sm bg-base-300 cursor-not-allowed">
          Disabled
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-base-content/30 rounded-sm bg-base-300 cursor-not-allowed">
          <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2" opacity="0.3"/>
            <path d="M14 8a6 6 0 0 0-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Loading
        </button>
      </div>
    </div>

    <!-- States (Tertiary) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>States (Tertiary)</p>
      <div class="flex flex-wrap items-center gap-3">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-base-content rounded-sm bg-base-200 border border-base-content/5 transition-colors">
          Default
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-base-content rounded-sm bg-base-300 border border-base-content/5 transition-colors">
          Hover
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-base-content/30 rounded-sm bg-base-300 cursor-not-allowed">
          Disabled
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-base-content/30 rounded-sm bg-base-300 cursor-not-allowed">
          <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2" opacity="0.3"/>
            <path d="M14 8a6 6 0 0 0-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Loading
        </button>
      </div>
    </div>

    <!-- States (Danger) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>States (Danger)</p>
      <div class="flex flex-wrap items-center gap-3">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-error-content rounded-sm bg-error border border-base-content/5 transition-colors">
          Default
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-error-content rounded-sm bg-error-hover border border-base-content/5 transition-colors">
          Hover
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-base-content/30 rounded-sm bg-base-300 cursor-not-allowed">
          Disabled
        </button>
        <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-base-content/30 rounded-sm bg-base-300 cursor-not-allowed">
          <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2" opacity="0.3"/>
            <path d="M14 8a6 6 0 0 0-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Loading
        </button>
      </div>
    </div>

    <!-- Icon Options (lg size, Primary) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Icon Options</p>
      <div class="flex flex-wrap items-center gap-3">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-primary-content rounded-sm bg-primary border border-base-content/5 hover:bg-primary-hover transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          Both
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-primary-content rounded-sm bg-primary border border-base-content/5 hover:bg-primary-hover transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          Left only
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-primary-content rounded-sm bg-primary border border-base-content/5 hover:bg-primary-hover transition-colors">
          Right only
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-primary-content rounded-sm bg-primary border border-base-content/5 hover:bg-primary-hover transition-colors">
          No icon
        </button>
      </div>
    </div>

  </div>

</body>
</html>
