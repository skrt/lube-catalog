<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
@theme {
  --color-primary: #0a0ac2;
  --color-primary-hover: #080892;
  --color-primary-content: #f3f4fe;
  --color-secondary: #e8e8fd;
  --color-secondary-hover: #e0e0f5;
  --color-secondary-content: #0a0ac2;
  --color-base-content: #101016;
  --color-base-200: #f8f8fa;
  --color-base-300: #eeeef2;
  --color-danger: #c94043;
  --color-danger-hover: #b7393c;
  --color-danger-content: #fff5f5;
  --color-danger-soft: #f7e2e3;
  --color-success: #479d72;
  --color-success-content: #f5fef9;
  --color-success-soft: #e3f0ea;
  --color-warning: #de781f;
  --color-warning-content: #fffcf8;
  --color-warning-soft: #faebdd;
  --color-info: #535671;
  --color-info-content: #f2f4ff;
  --color-info-soft: #e5e6ea;
  --radius-sm: 4px;
  --shadow-border-base-content-5: inset 0 0 0 1px rgba(16, 16, 22, 0.05);
  --shadow-border-base-content-10: inset 0 0 0 1px rgba(16, 16, 22, 0.1);
  --shadow-border-base-content-20: inset 0 0 0 1px rgba(16, 16, 22, 0.2);
  --shadow-border-2-base-content-10: inset 0 0 0 2px rgba(16, 16, 22, 0.1);
  --shadow-border-2-base-content-20: inset 0 0 0 2px rgba(16, 16, 22, 0.2);
  --shadow-border-primary: inset 0 0 0 1px #0a0ac2;
  --shadow-border-2-primary: inset 0 0 0 2px #0a0ac2;
  --shadow-border-danger: inset 0 0 0 1px #c94043;
  --shadow-border-2-danger: inset 0 0 0 2px #c94043;
}
</style>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; min-height: 200px !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens:
    Link: テキストリンク（Button / IconButton の Tertiary よりも優先度の低い補助的な導線）
      Color: text-secondary-content (#0a0ac2 青)。Props の Link / Table の LinkText と同じ
      Hover: hover:underline（下線は hover 時のみ）
      Weight: Semibold=font-semibold / Normal=font-normal
      Size: md=text-sm/leading-5 (14px) / sm=text-xs/leading-4 (12px・テーブル等の密なエリア)
      Focus: focus-visible:ring-2 ring-primary ring-offset-2
      実装: <a>（link_to）に以下クラス。静的プレビューは span+tabindex で表現
  -->

  <div class="space-y-10">

    <!-- Semibold -->
    <div>
      <p class="text-xs font-normal text-gray-400 tracking-wider mb-4">Semibold</p>
      <div class="flex items-center gap-8">
        <div class="flex flex-col gap-1.5 items-start">
          <span tabindex="0" class="text-sm font-semibold leading-5 text-secondary-content hover:underline cursor-pointer focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">株式会社コトハ商事</span>
          <span class="text-[10px] text-gray-400">Default</span>
        </div>
        <div class="flex flex-col gap-1.5 items-start">
          <span class="text-sm font-semibold leading-5 text-secondary-content underline cursor-pointer">株式会社コトハ商事</span>
          <span class="text-[10px] text-gray-400">Hover</span>
        </div>
      </div>
    </div>

    <!-- Normal -->
    <div>
      <p class="text-xs font-normal text-gray-400 tracking-wider mb-4">Normal</p>
      <div class="flex items-center gap-8">
        <div class="flex flex-col gap-1.5 items-start">
          <span tabindex="0" class="text-sm font-normal leading-5 text-secondary-content hover:underline cursor-pointer focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">リンクテキスト</span>
          <span class="text-[10px] text-gray-400">Default</span>
        </div>
        <div class="flex flex-col gap-1.5 items-start">
          <span class="text-sm font-normal leading-5 text-secondary-content underline cursor-pointer">リンクテキスト</span>
          <span class="text-[10px] text-gray-400">Hover</span>
        </div>
      </div>
    </div>

    <!-- Sizes -->
    <div>
      <p class="text-xs font-normal text-gray-400 tracking-wider mb-4">Sizes</p>
      <div class="flex items-center gap-8">
        <div class="flex flex-col gap-1.5 items-start">
          <span tabindex="0" class="text-sm font-normal leading-5 text-secondary-content hover:underline cursor-pointer focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">リンクテキスト</span>
          <span class="text-[10px] text-gray-400">md (text-sm)</span>
        </div>
        <div class="flex flex-col gap-1.5 items-start">
          <span tabindex="0" class="text-xs font-normal leading-4 text-secondary-content hover:underline cursor-pointer focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">リンクテキスト</span>
          <span class="text-[10px] text-gray-400">sm (text-xs)</span>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
