<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../tailwind.config.js"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 24px 24px !important; min-height: 200px !important; box-sizing: border-box; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    Image: 画像サムネイル
      Size: lg (720px), md (220px), sm (108px)
      Image=true: 実画像表示、object-cover、rounded-lg
      Image=false: bg-base-200、rounded-lg、centered placeholder
        Icon: image (Lucide)、base-content/30
        Text: "NO IMAGE"、base-content/30
        lg: icon 24px + text-base
        md: icon 20px + text-sm
        sm: icon 16px + text-xs
  -->

  <div class="space-y-10">

    <!-- Sizes (Image) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Sizes (Image)</p>
      <div class="flex flex-wrap items-end gap-6">
        <div class="flex flex-col gap-1.5">
          <div class="size-[108px] rounded-lg overflow-hidden bg-base-200">
            <img src="https://www.figma.com/api/mcp/asset/d5726089-e524-4077-9aec-e2eaac421641" alt="" class="w-full h-full object-cover">
          </div>
          <span class="text-xs text-base-content/60">sm</span>
        </div>
        <div class="flex flex-col gap-1.5">
          <div class="size-[220px] rounded-lg overflow-hidden bg-base-200">
            <img src="https://www.figma.com/api/mcp/asset/d5726089-e524-4077-9aec-e2eaac421641" alt="" class="w-full h-full object-cover">
          </div>
          <span class="text-xs text-base-content/60">md</span>
        </div>
        <div class="flex flex-col gap-1.5">
          <div class="size-[720px] max-w-full rounded-lg overflow-hidden bg-base-200">
            <img src="https://www.figma.com/api/mcp/asset/d5726089-e524-4077-9aec-e2eaac421641" alt="" class="w-full h-full object-cover">
          </div>
          <span class="text-xs text-base-content/60">lg</span>
        </div>
      </div>
    </div>

    <!-- Sizes (Placeholder) -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Sizes (Placeholder)</p>
      <div class="flex flex-wrap items-end gap-6">
        <div class="flex flex-col gap-1.5">
          <div class="size-[108px] rounded-lg bg-base-200 flex flex-col items-center justify-center gap-1">
            <svg class="w-4 h-4 text-base-content/30" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            <span class="text-xs leading-4 text-base-content/30">NO IMAGE</span>
          </div>
          <span class="text-xs text-base-content/60">sm</span>
        </div>
        <div class="flex flex-col gap-1.5">
          <div class="size-[220px] rounded-lg bg-base-200 flex flex-col items-center justify-center gap-1">
            <svg class="w-5 h-5 text-base-content/30" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            <span class="text-sm leading-5 text-base-content/30">NO IMAGE</span>
          </div>
          <span class="text-xs text-base-content/60">md</span>
        </div>
        <div class="flex flex-col gap-1.5">
          <div class="size-[720px] max-w-full rounded-lg bg-base-200 flex flex-col items-center justify-center gap-1">
            <svg class="w-6 h-6 text-base-content/30" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            <span class="text-base leading-6 text-base-content/30">NO IMAGE</span>
          </div>
          <span class="text-xs text-base-content/60">lg</span>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
