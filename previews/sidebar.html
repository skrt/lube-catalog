<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../tailwind.config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 40px !important; min-height: 600px !important; box-sizing: border-box; background: white !important; box-shadow: inset 0 0 0 1px rgba(16,16,22,0.1) !important; border-radius: 8px !important; }
.in-iframe.demo-only, .in-iframe.demo-only body { scrollbar-width: none; }
.in-iframe.demo-only::-webkit-scrollbar, .in-iframe.demo-only body::-webkit-scrollbar { display: none; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    Sidebar: アプリ左の主ナビゲーション
      Open (Expanded): w-160px, bg-base-200 (#f8f8fa), p-2, gap-4
        - Logo row: logo + panel-left-close IconButton
        - Section group: title (text-xs, text-base-content/30) + MenuButton items
      Closed (Collapsed): w-60px, bg-base-200, p-2, gap-3, items-center
        - panel-right-open IconButton
        - Divider: h-1px, bg base-content/10, w-44px
        - Collapsed MenuButtons (icon only)
    Icons (Lucide):
      panel-left-close, panel-right-open (sidebar toggle)
      package-search (見積依頼), percent (見積書), handshake (発注請書),
      truck (発注書), receipt-japanese-yen (請求書), store (デマンド), factory (サプライヤー)
  -->

  <div class="space-y-10">

    <!-- Demo -->
    <div id="demo-section" x-data="{ open: true, active: 'mitsumori-irai' }">
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Demo</p>
      <p class="text-sm text-gray-500 mb-4">パネルのアイコンボタンをクリックで開閉を切り替え</p>
      <div class="bg-base-200 flex flex-col p-2 rounded-lg transition-[width] duration-200 ease-in-out"
           :class="open ? 'w-40 gap-4 items-start' : 'w-fit gap-2 items-center'">
        <!-- Header -->
        <div class="flex items-center w-full shrink-0"
             :class="open ? 'justify-between pl-3' : 'justify-center'">
          <svg x-show="open" width="52" height="18" viewBox="0 0 52 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M50.4448 11.1603C50.4448 11.4483 50.4208 11.7363 50.3728 12.0243H39.8608C40.1968 14.1363 41.7088 15.4323 43.8208 15.4323C45.3808 15.4323 46.6288 14.7123 47.3248 13.5123H50.1328C49.1008 16.2483 46.7248 17.9283 43.8208 17.9283C40.0288 17.9283 37.1728 15.0003 37.1728 11.1123C37.1728 7.24831 40.0288 4.32031 43.8208 4.32031C47.8048 4.32031 50.4448 7.39231 50.4448 11.1603ZM43.8208 6.74431C41.8288 6.74431 40.3648 7.94431 39.9328 9.86431H47.7568C47.2768 7.89631 45.8128 6.74431 43.8208 6.74431Z" fill="#101016"/><path d="M28.5214 4.32C32.4574 4.32 35.2654 7.224 35.2654 11.136C35.2654 15 32.4574 17.928 28.5214 17.928C26.7214 17.928 25.1134 17.256 23.9614 16.128L23.6254 17.616H21.6094V0H24.2734V5.832C25.4014 4.872 26.8654 4.32 28.5214 4.32ZM28.3294 15.36C30.7774 15.36 32.5534 13.56 32.5534 11.112C32.5534 8.688 30.7774 6.864 28.3294 6.864C25.8814 6.864 24.0814 8.688 24.0814 11.112C24.0814 13.536 25.8814 15.36 28.3294 15.36Z" fill="#101016"/><path d="M12.1333 17.9288C8.55731 17.9288 6.22931 15.6248 6.22931 12.1208V4.63281H8.89331V11.7608C8.89331 14.0168 10.1173 15.3848 12.1333 15.3848C14.1493 15.3848 15.3493 13.9928 15.3493 11.7608V4.63281H18.0133V12.1208C18.0133 15.6248 15.7093 17.9288 12.1333 17.9288Z" fill="#101016"/><path d="M0 17.592V0H2.664V17.592H0Z" fill="#101016"/></svg>
          <!-- panel-left-close / panel-right-open -->
          <button @click="open = !open" class="flex items-center justify-center p-2 rounded hover:bg-base-300 shrink-0">
            <svg x-show="open" class="w-4 h-4 text-base-content" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="m16 15-3-3 3-3"/></svg>
            <svg x-show="!open" x-cloak class="w-4 h-4 text-base-content" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="m14 9 3 3-3 3"/></svg>
          </button>
        </div>
        <!-- Divider (collapsed only) -->
        <div x-show="!open" x-cloak class="h-px w-full bg-base-content/10"></div>
        <!-- Section: 書類一覧 -->
        <div class="flex flex-col w-full" :class="open ? '' : 'items-center gap-2'">
          <div x-show="open" class="px-3 py-2"><p class="text-xs leading-4 text-base-content/30 whitespace-nowrap">書類一覧</p></div>
          <template x-for="item in [{id:'mitsumori-irai',label:'見積依頼'},{id:'mitsumori',label:'見積書'},{id:'hacchu-ukesho',label:'発注請書'},{id:'hacchu',label:'発注書'},{id:'seikyu',label:'請求書'}]" :key="item.id">
            <div class="relative group" @click="active = item.id">
              <div class="flex items-center rounded-md shrink-0 cursor-pointer border"
                :class="[
                  open ? 'gap-2 px-3 py-2 w-full' : 'justify-center p-3',
                  active === item.id ? 'bg-secondary border-base-content/5' : 'border-transparent hover:bg-base-300'
                ]">
                <svg x-show="item.id==='mitsumori-irai'" class="w-4 h-4 shrink-0" :class="active === item.id ? 'text-primary' : 'text-base-content'" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14"/><path d="m7.5 4.27 9 5.15"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" x2="12" y1="22" y2="12"/><circle cx="18.5" cy="15.5" r="2.5"/><path d="M20.27 17.27 22 19"/></svg>
                <svg x-show="item.id==='mitsumori'" class="w-4 h-4 shrink-0" :class="active === item.id ? 'text-primary' : 'text-base-content'" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="19" x2="5" y1="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
                <svg x-show="item.id==='hacchu-ukesho'" class="w-4 h-4 shrink-0" :class="active === item.id ? 'text-primary' : 'text-base-content'" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m11 17 2 2a1 1 0 1 0 3-3"/><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4"/><path d="m21 3 1 11h-2"/><path d="M3 3 2 14h2"/></svg>
                <svg x-show="item.id==='hacchu'" class="w-4 h-4 shrink-0" :class="active === item.id ? 'text-primary' : 'text-base-content'" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>
                <svg x-show="item.id==='seikyu'" class="w-4 h-4 shrink-0" :class="active === item.id ? 'text-primary' : 'text-base-content'" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="m8 12 4-6 4 6"/><path d="M11 12h2"/><path d="M11 15h2"/><path d="M12 12v6"/></svg>
                <span x-show="open" class="text-sm leading-5 whitespace-nowrap" :class="active === item.id ? 'text-primary' : 'text-base-content'" x-text="item.label"></span>
              </div>
              <div x-show="!open" x-cloak class="absolute left-full top-1/2 -translate-y-1/2 ml-2 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-10"><div class="relative px-2 py-1 rounded-sm bg-info text-primary-content text-sm leading-5 whitespace-nowrap"><span class="absolute left-[-4px] top-1/2 -translate-y-1/2 w-0 h-0 border-t-[5px] border-t-transparent border-b-[5px] border-b-transparent border-r-[4px] border-r-info"></span><span x-text="item.label"></span></div></div>
            </div>
          </template>
        </div>
        <!-- Divider (collapsed only) -->
        <div x-show="!open" x-cloak class="h-px w-full bg-base-content/10"></div>
        <!-- Section: マスタ -->
        <div class="flex flex-col w-full" :class="open ? '' : 'items-center gap-2'">
          <div x-show="open" class="px-3 py-2"><p class="text-xs leading-4 text-base-content/30 whitespace-nowrap">マスタ</p></div>
          <template x-for="item in [{id:'demand',label:'デマンド'},{id:'supplier',label:'サプライヤー'}]" :key="item.id">
            <div class="relative group" @click="active = item.id">
              <div class="flex items-center rounded-md shrink-0 cursor-pointer border"
                :class="[
                  open ? 'gap-2 px-3 py-2 w-full' : 'justify-center p-3',
                  active === item.id ? 'bg-secondary border-base-content/5' : 'border-transparent hover:bg-base-300'
                ]">
                <svg x-show="item.id==='demand'" class="w-4 h-4 shrink-0" :class="active === item.id ? 'text-primary' : 'text-base-content'" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/><path d="M2 7h20"/><path d="M22 7v3a2 2 0 0 1-2 2a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12a2 2 0 0 1-2-2V7"/></svg>
                <svg x-show="item.id==='supplier'" class="w-4 h-4 shrink-0" :class="active === item.id ? 'text-primary' : 'text-base-content'" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M17 18h1"/><path d="M12 18h1"/><path d="M7 18h1"/></svg>
                <span x-show="open" class="text-sm leading-5 whitespace-nowrap" :class="active === item.id ? 'text-primary' : 'text-base-content'" x-text="item.label"></span>
              </div>
              <div x-show="!open" x-cloak class="absolute left-full top-1/2 -translate-y-1/2 ml-2 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-10"><div class="relative px-2 py-1 rounded-sm bg-info text-primary-content text-sm leading-5 whitespace-nowrap"><span class="absolute left-[-4px] top-1/2 -translate-y-1/2 w-0 h-0 border-t-[5px] border-t-transparent border-b-[5px] border-b-transparent border-r-[4px] border-r-info"></span><span x-text="item.label"></span></div></div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- Open / Closed side by side -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Open / Closed</p>
      <div class="flex items-start gap-6">

        <!-- Open (Expanded) -->
        <div class="bg-base-200 flex flex-col gap-4 items-start p-2 rounded-lg" class="w-40">
          <!-- Logo row -->
          <div class="flex items-center justify-between w-full pl-3">
            <svg width="52" height="18" viewBox="0 0 52 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M50.4448 11.1603C50.4448 11.4483 50.4208 11.7363 50.3728 12.0243H39.8608C40.1968 14.1363 41.7088 15.4323 43.8208 15.4323C45.3808 15.4323 46.6288 14.7123 47.3248 13.5123H50.1328C49.1008 16.2483 46.7248 17.9283 43.8208 17.9283C40.0288 17.9283 37.1728 15.0003 37.1728 11.1123C37.1728 7.24831 40.0288 4.32031 43.8208 4.32031C47.8048 4.32031 50.4448 7.39231 50.4448 11.1603ZM43.8208 6.74431C41.8288 6.74431 40.3648 7.94431 39.9328 9.86431H47.7568C47.2768 7.89631 45.8128 6.74431 43.8208 6.74431Z" fill="#101016"/><path d="M28.5214 4.32C32.4574 4.32 35.2654 7.224 35.2654 11.136C35.2654 15 32.4574 17.928 28.5214 17.928C26.7214 17.928 25.1134 17.256 23.9614 16.128L23.6254 17.616H21.6094V0H24.2734V5.832C25.4014 4.872 26.8654 4.32 28.5214 4.32ZM28.3294 15.36C30.7774 15.36 32.5534 13.56 32.5534 11.112C32.5534 8.688 30.7774 6.864 28.3294 6.864C25.8814 6.864 24.0814 8.688 24.0814 11.112C24.0814 13.536 25.8814 15.36 28.3294 15.36Z" fill="#101016"/><path d="M12.1333 17.9288C8.55731 17.9288 6.22931 15.6248 6.22931 12.1208V4.63281H8.89331V11.7608C8.89331 14.0168 10.1173 15.3848 12.1333 15.3848C14.1493 15.3848 15.3493 13.9928 15.3493 11.7608V4.63281H18.0133V12.1208C18.0133 15.6248 15.7093 17.9288 12.1333 17.9288Z" fill="#101016"/><path d="M0 17.592V0H2.664V17.592H0Z" fill="#101016"/></svg>
            <!-- panel-left-close -->
            <button class="flex items-center justify-center p-2 rounded">
              <svg class="w-4 h-4 text-base-content" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="m16 15-3-3 3-3"/></svg>
            </button>
          </div>
          <!-- Section: 書類一覧 -->
          <div class="flex flex-col w-full">
            <div class="px-3 py-2">
              <p class="text-xs leading-4 text-base-content/30">書類一覧</p>
            </div>
            <!-- package-search (Active) -->
            <div class="flex items-center gap-2 px-3 py-2 rounded-md bg-secondary border border-base-content/5 w-full">
              <svg class="w-4 h-4 shrink-0 text-primary" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14"/><path d="m7.5 4.27 9 5.15"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" x2="12" y1="22" y2="12"/><circle cx="18.5" cy="15.5" r="2.5"/><path d="M20.27 17.27 22 19"/></svg>
              <span class="text-sm leading-5 text-primary">見積依頼</span>
            </div>
            <!-- percent -->
            <div class="flex items-center gap-2 px-3 py-2 rounded-md w-full">
              <svg class="w-4 h-4 shrink-0 text-base-content" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="19" x2="5" y1="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
              <span class="text-sm leading-5 text-base-content">見積書</span>
            </div>
            <!-- handshake -->
            <div class="flex items-center gap-2 px-3 py-2 rounded-md w-full">
              <svg class="w-4 h-4 shrink-0 text-base-content" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m11 17 2 2a1 1 0 1 0 3-3"/><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4"/><path d="m21 3 1 11h-2"/><path d="M3 3 2 14h2"/></svg>
              <span class="text-sm leading-5 text-base-content">発注請書</span>
            </div>
            <!-- truck -->
            <div class="flex items-center gap-2 px-3 py-2 rounded-md w-full">
              <svg class="w-4 h-4 shrink-0 text-base-content" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>
              <span class="text-sm leading-5 text-base-content">発注書</span>
            </div>
            <!-- receipt-japanese-yen -->
            <div class="flex items-center gap-2 px-3 py-2 rounded-md w-full">
              <svg class="w-4 h-4 shrink-0 text-base-content" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="m8 12 4-6 4 6"/><path d="M11 12h2"/><path d="M11 15h2"/><path d="M12 12v6"/></svg>
              <span class="text-sm leading-5 text-base-content">請求書</span>
            </div>
          </div>
          <!-- Section: マスタ -->
          <div class="flex flex-col w-full">
            <div class="px-3 py-2">
              <p class="text-xs leading-4 text-base-content/30">マスタ</p>
            </div>
            <!-- store -->
            <div class="flex items-center gap-2 px-3 py-2 rounded-md w-full">
              <svg class="w-4 h-4 shrink-0 text-base-content" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/><path d="M2 7h20"/><path d="M22 7v3a2 2 0 0 1-2 2a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12a2 2 0 0 1-2-2V7"/></svg>
              <span class="text-sm leading-5 text-base-content">デマンド</span>
            </div>
            <!-- factory -->
