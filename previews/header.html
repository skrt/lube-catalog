<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'primary': {
          DEFAULT: '#0a0ac2',
          hover: '#080892',
          content: '#f3f4fe',
        },
        'secondary': {
          DEFAULT: '#e8e8fd',
          hover: '#e0e0f5',
          content: '#0a0ac2',
        },
        'base-content': 'rgb(16 16 22 / <alpha-value>)',
        'base-200': '#f8f8fa',
        'base-300': '#eeeef2',
        'error': {
          DEFAULT: '#c94043',
          hover: '#b7393c',
          content: '#fff5f5',
          'bg': '#f7e2e3',
        },
        'success': {
          DEFAULT: '#479d72',
          content: '#f5fef9',
          'bg': '#e3f0ea',
        },
        'warning': {
          DEFAULT: '#de781f',
          content: '#fffcf8',
          'bg': '#faebdd',
        },
        'info': {
          DEFAULT: '#535671',
          content: '#f2f4ff',
          'bg': '#e5e6ea',
        },
      },
      borderRadius: {
        'sm': '4px',
      },
      boxShadow: {
        'border-base-content-5': 'inset 0 0 0 1px rgba(16, 16, 22, 0.05)',
        'border-base-content-10': 'inset 0 0 0 1px rgba(16, 16, 22, 0.1)',
        'border-base-content-20': 'inset 0 0 0 1px rgba(16, 16, 22, 0.2)',
        'border-2-base-content-10': 'inset 0 0 0 2px rgba(16, 16, 22, 0.1)',
        'border-2-base-content-20': 'inset 0 0 0 2px rgba(16, 16, 22, 0.2)',
        'border-primary': 'inset 0 0 0 1px #0a0ac2',
        'border-2-primary': 'inset 0 0 0 2px #0a0ac2',
        'border-error': 'inset 0 0 0 1px #c94043',
        'border-2-error': 'inset 0 0 0 2px #c94043',
      },
    },
  },
};
</script>
  <script src="https://unpkg.com/lucide@latest"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: white !important; box-shadow: inset 0 0 0 0.5px rgba(16,16,22,0.1) !important; border-radius: 8px !important; padding: 36px 32px 32px !important; min-height: 200px !important; box-sizing: border-box; }
.in-iframe.demo-only, .in-iframe.demo-only body { scrollbar-width: none; }
.in-iframe.demo-only::-webkit-scrollbar, .in-iframe.demo-only body::-webkit-scrollbar { display: none; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!--
    Design Tokens (from Figma):
    Header: アプリ上部ヘッダーバー
      Container: flex, items-center, justify-between, py-2 (8px), full width
      Left: Breadcrumbs（既存コンポーネント）
      Right (Account): flex, gap-4 (16px), items-center
        IconButton: sm Tertiary (p-1.5, icon 12px, bg-base-200, border base-content/5, rounded-md)
          icons: log-out, settings
        Username: text-sm, text-base-content
  -->

  <div class="space-y-10">

    <!-- Default -->
    <div>
      <p class="flex items-center gap-1.5 text-xs font-normal text-gray-400 tracking-wider mb-4"><span class="w-1 h-1 rounded-full bg-gray-300"></span>Default</p>
      <div class="flex items-center justify-between py-2 w-full">
        <!-- Breadcrumbs -->
        <div class="flex items-center gap-2">
          <span class="text-sm leading-5 text-base-content/60">デマンド</span>
          <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-base-content/60 shrink-0"></i>
          <span class="text-sm leading-5 text-base-content/60">株式会社コトハ商事</span>
          <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-base-content/60 shrink-0"></i>
          <span class="text-sm leading-5 text-base-content/60">商品一覧</span>
          <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-base-content/60 shrink-0"></i>
          <span class="text-sm leading-5 text-base-content">衣類配送用BOX</span>
        </div>
        <!-- Account -->
        <div class="flex items-center gap-4">
          <button class="bg-base-200 border border-base-content/5 flex items-center justify-center p-1.5 rounded-md hover:bg-base-300 transition-colors">
            <i data-lucide="log-out" class="w-3 h-3 text-base-content"></i>
          </button>
          <button class="bg-base-200 border border-base-content/5 flex items-center justify-center p-1.5 rounded-md hover:bg-base-300 transition-colors">
            <i data-lucide="settings" class="w-3 h-3 text-base-content"></i>
          </button>
          <span class="text-sm leading-5 text-base-content">山田 花子</span>
        </div>
      </div>
    </div>

  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
